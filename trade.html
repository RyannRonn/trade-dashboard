<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>수출입 무역통계 트래킹</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05080e;--bg2:#0b1018;--bg3:#121a28;--bg4:#192236;--bd:#1a2436;--t1:#e6ecf6;--t2:#a4b2c8;--t3:#687891;--t4:#3c4b62;--bl:#4d9fff;--gn:#34d399;--rd:#ef5f5f;--am:#e8a830;--pr:#a78bfa;--cy:#22d3ee;--pk:#f472b6;--bl-g:rgba(77,159,255,.08);--gn-g:rgba(52,211,153,.08);--rd-g:rgba(239,95,95,.08)}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.mono{font-family:"Fira Code",monospace}
.hdr{background:linear-gradient(135deg,#080d16,#0f1724,#080d16);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;font-weight:900}.hdr h1 em{font-style:normal;background:linear-gradient(90deg,var(--bl),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:9.5px;color:var(--t4);margin-top:1px;font-family:"Fira Code"}
.hdr-r{display:flex;align-items:center;gap:8px}
.abg{padding:3px 10px;background:var(--gn-g);border:1px solid rgba(52,211,153,.22);border-radius:16px;font-size:9.5px;color:var(--gn);font-family:"Fira Code";display:flex;align-items:center;gap:5px}
.abg::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gn);animation:bk 2s ease infinite}
.abg.demo{color:var(--am);background:rgba(232,168,48,.08);border-color:rgba(232,168,48,.22)}
.abg.demo::before{background:var(--am)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
.gear-btn{width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .1s}
.gear-btn:hover{border-color:var(--bl);color:var(--bl)}

/* SETTINGS PANEL */
.settings{display:none;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;margin:10px 24px;padding:16px}
.settings.show{display:block}
.settings h3{font-size:13px;font-weight:700;margin-bottom:10px}
.settings label{font-size:11px;color:var(--t3);display:block;margin-bottom:4px}
.settings input{width:100%;max-width:500px;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--bg3);color:var(--t1);font-family:"Fira Code";font-size:12px;margin-bottom:10px}
.settings input:focus{outline:none;border-color:var(--bl)}
.settings .s-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.settings button{padding:6px 16px;border:1px solid var(--bl);border-radius:6px;background:var(--bl-g);color:var(--bl);font-size:12px;font-weight:600;cursor:pointer;font-family:"Noto Sans KR";transition:all .1s}
.settings button:hover{background:var(--bl);color:#fff}
.settings .status{font-size:11px;color:var(--t3);margin-top:6px}
.settings .status.ok{color:var(--gn)}.settings .status.err{color:var(--rd)}

.kbar{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;padding:10px 24px}
@media(max-width:900px){.kbar{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.kbar{grid-template-columns:1fr 1fr}}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.kpi:hover{border-color:var(--bl);transform:translateY(-1px)}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0;opacity:.6}
.kpi:nth-child(1)::after{background:var(--bl)}.kpi:nth-child(2)::after{background:var(--am)}.kpi:nth-child(3)::after{background:var(--pk)}.kpi:nth-child(4)::after{background:var(--cy)}.kpi:nth-child(5)::after{background:var(--pr)}.kpi:nth-child(6)::after{background:var(--gn)}
.kpi .kl{font-size:9.5px;color:var(--t3);font-weight:500;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi .kv{font-family:"Fira Code";font-size:17px;font-weight:700;margin:2px 0 1px}
.kpi .kc{font-family:"Fira Code";font-size:9.5px;display:flex;gap:6px}
.tw{padding:0 24px;border-bottom:1px solid var(--bd)}.tabs{display:flex;gap:1px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 15px;border:none;background:transparent;color:var(--t3);font-family:"Noto Sans KR";font-size:12px;font-weight:600;cursor:pointer;transition:all .1s;white-space:nowrap;border-bottom:2px solid transparent}
.tab:hover{color:var(--t2)}.tab.on{color:var(--bl);border-bottom-color:var(--bl)}
.cnt{padding:16px 24px;min-height:55vh}
.st{font-size:13px;font-weight:700;margin:16px 0 10px;display:flex;align-items:center;gap:7px}
.st .d{width:3px;height:14px;border-radius:2px;background:var(--bl)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:768px){.cg{grid-template-columns:1fr}}
.cb{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:13px}
.cb.w{grid-column:1/-1}.cb h4{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:10px}
.cb canvas{max-height:240px}
.ts{overflow-x:auto;margin-bottom:14px}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{padding:7px 8px;text-align:right;font-weight:600;color:var(--t4);border-bottom:2px solid var(--bd);font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
table.dt th:first-child{text-align:center;width:32px}table.dt th:nth-child(2){text-align:left}
table.dt td{padding:5px 8px;text-align:right;font-family:"Fira Code";font-size:11px;border-bottom:1px solid rgba(26,36,54,.6);color:var(--t2)}
table.dt td:first-child{text-align:center;color:var(--t4);font-weight:700;width:32px}
table.dt td:nth-child(2){text-align:left;font-family:"Noto Sans KR";font-weight:500;color:var(--t1)}
table.dt tr:hover{background:rgba(255,255,255,.015)}
table.dt tr.ck{cursor:pointer}table.dt tr.ck:hover{background:rgba(77,159,255,.04)}
.bar-c{position:relative}.bar-b{position:absolute;top:2px;bottom:2px;left:0;border-radius:3px;opacity:.15}
.up{color:var(--gn)}.dn{color:var(--rd)}.nt{color:var(--t4)}
.bg{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:9.5px;font-weight:600;font-family:"Fira Code"}
.bg.up{color:var(--gn);background:var(--gn-g)}.bg.dn{color:var(--rd);background:var(--rd-g)}.bg.nt{color:var(--t4)}
.pills{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.pill{padding:5px 14px;border:1px solid var(--bd);border-radius:20px;background:transparent;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;transition:all .1s;font-family:"Noto Sans KR"}
.pill:hover{border-color:var(--t3)}.pill.on{border-color:var(--bl);color:var(--bl);background:var(--bl-g)}
.pill.corp{border-color:rgba(244,114,182,.3);color:var(--pk);opacity:.55}.pill.corp:hover{border-color:var(--pk);opacity:.85}.pill.corp.on{border-color:var(--pk);color:var(--pk);background:rgba(244,114,182,.08);opacity:1}
.rank-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.rank-head .pills{margin:0}
.bbtn{padding:5px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:"Noto Sans KR";transition:all .1s}
.bbtn:hover{border-color:var(--bl);color:var(--bl)}
.ftr{padding:12px 24px;border-top:1px solid var(--bd);font-size:9px;color:var(--t4);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.loading-bar{position:fixed;top:0;left:0;height:2px;background:var(--bl);transition:width .3s;z-index:999;box-shadow:0 0 8px var(--bl)}
.srch-bar{padding:8px 24px;border-bottom:1px solid var(--bd);position:relative;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.srch-bar input{flex:0 0 320px;max-width:100%;padding:7px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--t1);font-family:"Fira Code",monospace;font-size:12px}
.srch-bar input:focus{outline:none;border-color:var(--bl)}
.srch-bar .srch-hint{font-size:10px;color:var(--t4);font-family:"Fira Code"}
.srch-drop{position:absolute;top:46px;left:24px;width:380px;max-width:calc(100% - 48px);background:var(--bg2);border:1px solid var(--bd);border-radius:6px;max-height:340px;overflow-y:auto;z-index:50;display:none;box-shadow:0 4px 18px rgba(0,0,0,.5)}
.srch-drop.show{display:block}
.srch-item{padding:7px 10px;cursor:pointer;border-bottom:1px solid rgba(26,36,54,.6);display:flex;align-items:center;gap:10px}
.srch-item:last-child{border-bottom:none}
.srch-item:hover,.srch-item.hi{background:rgba(77,159,255,.08)}
.srch-item .si-hs{font-family:"Fira Code";font-size:11px;color:var(--t3);min-width:62px}
.srch-item .si-name{font-size:12px;color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:"Noto Sans KR"}
.srch-item .si-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-family:"Fira Code";font-weight:600}
.srch-item .si-tag.t-item{color:var(--bl);background:var(--bl-g)}
.srch-item .si-tag.t-rank{color:var(--am);background:rgba(232,168,48,.08)}
.srch-item .si-tag.t-country{color:var(--gn);background:var(--gn-g)}
.tab .tab-x{margin-left:6px;color:var(--t4);font-size:11px;padding:0 3px;border-radius:3px}
.tab .tab-x:hover{color:var(--rd);background:rgba(239,95,95,.1)}
.cs-hd{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.cs-sw{position:relative;flex:1;min-width:280px;max-width:520px}
.cs-in{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--t1);font-family:"Fira Code",monospace;font-size:12px;box-sizing:border-box}
.cs-in:focus{outline:none;border-color:var(--cy)}
.cs-in.err{border-color:var(--rd);animation:cshake .3s}
@keyframes cshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.cs-sw .srch-drop{position:absolute;top:38px;left:0;width:100%;max-width:100%}
.cs-clr{padding:7px 12px;border:1px solid rgba(232,168,48,.4);background:rgba(232,168,48,.08);color:#e8a830;border-radius:6px;font-size:11px;font-family:"Fira Code";cursor:pointer}
.cs-clr:hover{background:rgba(232,168,48,.16)}
.map3d{position:relative;background:radial-gradient(ellipse at 50% 40%,#2e3b54 0%,#1d2840 90%);border:1px solid var(--bd);border-radius:8px;margin-bottom:16px;overflow:hidden}
.map3d-svg{width:100%;height:auto;display:block}
.map3d-cap{position:absolute;top:8px;left:12px;font-size:10.5px;color:var(--t3);font-family:"Fira Code",monospace;pointer-events:none;letter-spacing:.2px}
.map3d-cap b{color:var(--cy);font-weight:600}
.map3d-leg{position:absolute;bottom:10px;right:12px;display:flex;align-items:center;gap:9px;background:rgba(8,12,20,.88);padding:7px 11px;border-radius:6px;border:1px solid var(--bd);font-family:"Fira Code",monospace;pointer-events:none;font-size:9.5px;color:var(--t3)}
.map3d-leg .lg-end{line-height:1.25;text-align:center;white-space:nowrap}
.map3d-leg .lg-end .lg-tag{display:block;color:var(--t4);font-size:9px;letter-spacing:.4px;margin-bottom:1px}
.map3d-leg .lg-end.hi{color:var(--gn)}
.map3d-leg .lg-end.hi .lg-tag{color:var(--gn)}
.map3d-leg .lg-bar{display:inline-block;width:130px;height:10px;background:linear-gradient(90deg,hsl(150,12%,86%),hsl(154,56%,70%),hsl(158,100%,54%));border-radius:3px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15),0 0 6px hsla(158,100%,55%,.3)}
.map3d-status{padding:60px 20px;text-align:center;color:var(--t4);font-size:12px}
.map3d-land{stroke:#1a2440;stroke-width:.4;stroke-linejoin:round}
.map3d-c{cursor:pointer;transition:filter .12s,stroke .12s}
.map3d-c:hover{filter:saturate(1.3) brightness(1.18) drop-shadow(0 0 4px hsla(158,100%,60%,.7));stroke:#5fffae;stroke-width:1.2}
.map3d-c.no-data{cursor:default;fill:#3d4a64}
.map3d-c.no-data:hover{filter:none;stroke:#1a2440;stroke-width:.4}
.map3d-tt{position:absolute;pointer-events:none;background:rgba(8,12,20,.96);border:1px solid var(--bd);border-radius:6px;padding:7px 11px;font-family:"Fira Code",monospace;color:var(--t1);z-index:10;display:none;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.55);font-size:11px}
.map3d-tt.show{display:block}
.map3d-tt .tt-n{color:var(--cy);font-weight:700;margin-bottom:3px;font-size:12px}
.map3d-tt .tt-v{color:var(--t1)}
.map3d-tt .tt-h{color:var(--t4);font-size:10px;margin-top:2px}
</style>
</head>

<div class="loading-bar" id="loadBar" style="width:0%"></div>
<div class="hdr">
<div><h1>🇰🇷 <em>수출입 무역통계</em> 트래킹</h1><div class="sub">관세청 OpenAPI 기반 · <span id="dt"></span></div></div>

</div>
</div>

<div class="settings" id="settingsPanel">

</div>
</div>

<div class="kbar" id="kpi"></div>
<div class="srch-bar">

const API_BASE="https://apis.data.go.kr/1220000";

async function apiCall(path, params){
  const key=document.getElementById("apiKeyInput").value||localStorage.getItem("customs_api_key")||"";
  if(!key)throw new Error("API 키 없음");
  const url=new URL(API_BASE+path);
  url.searchParams.set("serviceKey",key);
  url.searchParams.set("type","json");
  url.searchParams.set("numOfRows","100");
  for(const[k,v]of Object.entries(params))url.searchParams.set(k,v);
  const r=await fetch(url);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  let items=d?.response?.body?.items;
  if(typeof items==="object"&&!Array.isArray(items))items=items.item;
  return Array.isArray(items)?items:items?[items]:[];
}

function parseYM(row){
  const y=row.trdYy||row.yr||"";const m=row.trdMm||row.mn||"";
  if(y&&m)return y+String(m).padStart(2,"0");
  return row.yyyyMm||null;
}
function flt(v){try{return parseFloat(v)||0}catch{return 0}}

function getDateRange(months=14){
  const now=new Date();
  const end=now.getFullYear()+String(now.getMonth()+1).padStart(2,"0");
  const s=new Date(now);s.setMonth(s.getMonth()-months);
  const start=s.getFullYear()+String(s.getMonth()+1).padStart(2,"0");
  return{start,end};
}

function rRanking(el){
  const R=D.ranking_6d||{};const N4=D.hs4_names||{};const N2=D.hs2_names||{};
  let allM=new Set();for(const d of Object.values(R))for(const m of Object.keys(d.exp||{}))allM.add(m);
  const months=[...allM].sort();const lm=months[months.length-1];
  if(!lm){el.innerHTML='<div style="text-align:center;padding:50px;color:var(--t4)">데이터 없음</div>';return}
  const MIN_EXP=1000000;
  const isPrice=(rankSort==="pyoy"||rankSort==="pmom");
  let rows=[];for(const[hs,d]of Object.entries(R)){
    const e=d.exp||{};const val=e[lm]||0;if(val<MIN_EXP)continue;
    const w=d.wgt||{};
    // 단가(USD/kg) 시계열 — 중량>0 & 수출>0. 중량 오보로 인한 단가 폭주(아티팩트) 차단:
    // 해당 HS 단가 중앙값의 [1/6, 6]배 범위 밖 월은 제외
    const praw={};for(const m in e){const wm=w[m]||0;if(wm>0&&e[m]>0)praw[m]=e[m]/wm;}
    const pv=Object.values(praw).sort((a,b)=>a-b);
    const medP=pv.length?pv[Math.floor((pv.length-1)/2)]:0;
    const pr={};if(medP>0)for(const m in praw){const p=praw[m];if(p>=medP/6&&p<=medP*6)pr[m]=p;}
    const hasPrice=Object.keys(pr).length>0;
    const hs4=hs.slice(0,4);const hs2=hs.slice(0,2);let nm4=N4[hs4]||"";let nm2=N2[hs2]||"";
    rows.push({hs,hs4,hs2,name:d.name||hs,nm4,nm2,val,mom:mom(e,lm),yoy:yoy(e,lm),exp:e,
      pr,price:hasPrice&&pr[lm]!=null?pr[lm]:null,pyoy:hasPrice?yoy(pr,lm):null,pmom:hasPrice?mom(pr,lm):null});
  }
  let disp=[...rows];

  else if(rankSort==="yoy")disp.sort((a,b)=>(b.yoy||0)-(a.yoy||0));

  else disp.sort((a,b)=>b.val-a.val);
  let h=`<div class="st"><span class="d" style="background:var(--rd)"></span>6자리 HS ${isPrice?"단가(USD/kg) 변동률":"수출 변동률"} (${fy(lm)}) — ${disp.length}개 (수출 100만USD↑${isPrice?" · 단가 산출 가능 품목만, 중량 이상치 제외":""})</div>`;
  h+=`<div class="pills"><button class="pill ${rankSort==="yoy"?"on":""}" onclick="rankSort='yoy';rMain()">수출YoY순</button><button class="pill ${rankSort==="mom"?"on":""}" onclick="rankSort='mom';rMain()">수출MoM순</button><button class="pill ${rankSort==="val"?"on":""}" onclick="rankSort='val';rMain()">금액순</button><button class="pill ${rankSort==="pyoy"?"on":""}" onclick="rankSort='pyoy';rMain()">단가YoY순</button><button class="pill ${rankSort==="pmom"?"on":""}" onclick="rankSort='pmom';rMain()">단가MoM순</button></div>`;
  h+='<div class="ts"><table class="dt" style="table-layout:fixed;width:100%;min-width:780px"><thead><tr><th style="width:30px">#</th><th style="width:50px">HS</th><th style="text-align:left">대분류</th><th style="text-align:left">분류</th><th style="text-align:left">품목</th><th style="width:62px">수출액</th><th style="width:54px">YoY</th><th style="width:54px">MoM</th><th style="width:56px">단가</th><th style="width:58px">단가YoY</th><th style="width:58px">단가MoM</th></tr></thead><tbody>';
  const tc="overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
  disp.forEach((r,i)=>{
    h+=`<tr class="ck" onclick="searchGo('${r.hs}')"><td>${i+1}</td><td class="mono" style="color:var(--t4)">${r.hs}</td><td style="${tc};text-align:left" title="${r.nm2}">${r.nm2}</td><td style="${tc};text-align:left" title="${(N4[r.hs4]||"").replace(/"/g,"&quot;")}">${r.nm4}</td><td style="${tc};text-align:left;font-family:Noto Sans KR" title="${r.name}">${r.name}</td><td>${fn(r.val)}</td><td>${chB(r.yoy)}</td><td>${chB(r.mom)}</td><td class="mono">${r.price!=null?r.price.toFixed(2):"—"}</td><td>${chB(r.pyoy)}</td><td>${chB(r.pmom)}</td></tr>`});
  h+='</tbody></table></div>';
  let c1items,c2items,c1title,c2title,valFn,fmtFn;
  if(isPrice){
    c1items=[...rows].filter(r=>r.pyoy!=null&&isFinite(r.pyoy)&&r.pyoy!==0).sort((a,b)=>b.pyoy-a.pyoy).slice(0,15);
    c2items=[...rows].filter(r=>r.pmom!=null&&isFinite(r.pmom)&&r.pmom!==0).sort((a,b)=>b.pmom-a.pmom).slice(0,15);
    c1title="단가 YoY 급등 TOP 15";c2title="단가 MoM 급등 TOP 15";
    valFn=(r,m)=>(r.pr[m]!=null?r.pr[m]:null);fmtFn=v=>v!=null?(+v).toFixed(2):"";
  }else{
    c1items=[...rows].filter(r=>r.yoy!=null&&r.yoy!==0).sort((a,b)=>(b.yoy||0)-(a.yoy||0)).slice(0,15);
    c2items=[...rows].filter(r=>r.mom!=null&&r.mom!==0).sort((a,b)=>(b.mom||0)-(a.mom||0)).slice(0,15);
    c1title="YoY 급등 TOP 15";c2title="MoM 급등 TOP 15";
    valFn=(r,m)=>(r.exp[m]||0);fmtFn=v=>fn(v);
  }
  h+=`<div class="cg"><div class="cb"><h4>${c1title}</h4><canvas id="rk1"></canvas></div><div class="cb"><h4>${c2title}</h4><canvas id="rk2"></canvas></div></div>`;
  el.innerHTML=h;
  const rm=months.slice(-12);
  const mk=(id,items)=>{const ctx=document.getElementById(id);if(!ctx)return;
    charts.push(new Chart(ctx,{type:"line",data:{labels:rm.map(fy),datasets:items.map((r,i)=>({label:`${r.name}(${r.hs})`,data:rm.map(m=>valFn(r,m)),borderColor:CL[i%CL.length],borderWidth:1.5,tension:.3,pointRadius:1,spanGaps:true}))},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:8,font:{size:9},color:"#c8d4e6"}},tooltip:{callbacks:{label:c=>c.dataset.label+": "+fmtFn(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>fmtFn(v),color:"#a4b2c8"},grid:{color:"rgba(255,255,255,.04)"}},x:{ticks:{color:"#8898b0"},grid:{display:false}}}}}))};
  mk("rk1",c1items);mk("rk2",c2items);
}

function buildCountryIndex(){
  if(CINV)return CINV;
  CINV={};
  for(const[hs,d]of Object.entries(D.ranking_6d||{})){
    const cs=d.countries||{};
    for(const[ck,cv]of Object.entries(cs)){
      if(!CINV[ck])CINV[ck]={code:ck,name:cv.name||ck,items:[]};
      CINV[ck].items.push({hs,name:d.name||hs,exp:cv.exp||{}});
    }
  }
  return CINV;
}
function buildRegionIndex(){
  if(RINV)return RINV;
  RINV={};
  const seen={}; // 지역코드 → Set(hs) — 동일 HS 중복 방지
  function add(hs,name,regs){
    for(const[rk,rv]of Object.entries(regs||{})){
      if(!RINV[rk])RINV[rk]={code:rk,name:rv.name||rk,items:[]};
      if(!seen[rk])seen[rk]=new Set();
      if(seen[rk].has(hs))continue;
      seen[rk].add(hs);
      RINV[rk].items.push({hs,name:name||hs,exp:rv.exp||{}});
    }
  }
  for(const[hs,d]of Object.entries(D.items||{}))add(hs,d.name,d.regions);
  for(const[hs,d]of Object.entries(D.ranking_6d||{}))add(hs,d.name,d.regions);
  // 후처리: 같은 지역 내 HS prefix 중복 제거 (예: 8542가 854232의 prefix면 8542 제거 → 집계 이중계상 방지)
  for(const v of Object.values(RINV)){
    const hsList=v.items.map(it=>it.hs);
    v.items=v.items.filter(it=>{
      for(const other of hsList){
        if(other!==it.hs&&other.length>it.hs.length&&other.startsWith(it.hs))return false;
      }
      return true;
    });
  }
  return RINV;
}
// 공통: 인덱스 → 정렬된 [{code,name,tot,items}], 선택 보정 후 sel 반환
function _byLocPrep(idx,curSel){
  let allM=new Set();
  for(const v of Object.values(idx))for(const it of v.items)for(const m of Object.keys(it.exp||{}))allM.add(m);
  const months=[...allM].sort();const lm=months[months.length-1];
  const arr=Object.entries(idx).map(([k,v])=>{
    let tot=0;for(const it of v.items)tot+=(it.exp[lm]||0);
    return {code:k,name:v.name,tot,items:v.items};
  }).sort((a,b)=>b.tot-a.tot);
  if(curSel&&!idx[curSel])curSel=null;
  if(!curSel)curSel=arr[0]?.code||null;
  return {arr,sel:arr.find(l=>l.code===curSel)||null,curSel};
}

  h+='</tbody></table></div>';

function buildCountryIndexForHs(hs){
  const out={};
  const d=(D.ranking_6d||{})[hs];
  if(!d)return out;
  const cs=d.countries||{};
  for(const[ck,cv]of Object.entries(cs)){
    out[ck]={code:ck,name:cv.name||ck,items:[{hs,name:d.name||hs,exp:cv.exp||{}}]};
  }
  return out;
}
// 국가별 탭 전용 검색: 탭 전환 없이 cFocusHs만 갱신
function cFocusGo(hs){

  if(!hs)return;
  if(!(D.ranking_6d||{})[hs]){
    const inp=document.getElementById("cSrchInput");if(inp){inp.classList.add("err");setTimeout(()=>inp.classList.remove("err"),600);}

  const drop=document.getElementById("cSrchDrop");if(drop){drop.classList.remove("show");drop.innerHTML="";}

function cFocusClear(){cFocusHs=null;cSel=null;rMain();}
// 국가 검색 (alpha-2 / 한국어명 CNAMES / 영문명 MAP_META)
function searchCountries(q){
  q=(q||"").trim();if(!q)return [];
  const ql=q.toLowerCase();
  const idx=buildCountryIndex();
  const out=[];
  for(const ck of Object.keys(idx)){
    const v=idx[ck];
    const koNm=CNAMES[ck]||v.name||"";
    const enNm=(MAP_META&&MAP_META[ck]&&MAP_META[ck].name)||"";
    if(ck.toLowerCase().includes(ql)||koNm.includes(q)||enNm.toLowerCase().includes(ql)){
      out.push({ck,name:koNm||enNm||ck});
    }
  }
  // 정확 매칭(코드/이름 시작)을 위로
  out.sort((a,b)=>{
    const aExact=(a.ck.toLowerCase()===ql||a.name===q)?0:1;
    const bExact=(b.ck.toLowerCase()===ql||b.name===q)?0:1;
    return aExact-bExact;
  });
  return out.slice(0,10);
}
function cGoCountry(ck){
  if(!ck)return;
  const idx=buildCountryIndex();
  if(!idx[ck]){
    const inp=document.getElementById("cSrchInput");if(inp){inp.classList.add("err");setTimeout(()=>inp.classList.remove("err"),600);}
    return;
  }
  cSel=ck;
  const drop=document.getElementById("cSrchDrop");if(drop){drop.classList.remove("show");drop.innerHTML="";}
  const inp=document.getElementById("cSrchInput");if(inp)inp.value="";
  rMain();
}
function cFocusSubmit(){
  const inp=document.getElementById("cSrchInput");if(!inp)return;
  const q=(inp.value||"").trim();if(!q)return;
  if(/^\d{2,10}$/.test(q)){cFocusGo(q);return;}
  // 국가 먼저 시도
  const cRes=searchCountries(q);
  if(cRes.length){cGoCountry(cRes[0].ck);return;}
  const r=searchHS(q).filter(x=>(D.ranking_6d||{})[x.hs]);
  if(r.length)cFocusGo(r[0].hs);
}
function _cDispatchItem(el){
  if(!el)return;
  if(el.dataset.type==="country")cGoCountry(el.dataset.ck);
  else cFocusGo(el.dataset.hs);
}
function cSetupSearch(){
  const inp=document.getElementById("cSrchInput");const drop=document.getElementById("cSrchDrop");
  if(!inp||!drop)return;
  let hi=-1;
  function render(){
    const q=inp.value;
    const cRes=searchCountries(q).slice(0,8);
    const hsRes=searchHS(q).filter(x=>(D.ranking_6d||{})[x.hs]).slice(0,12);
    const total=cRes.length+hsRes.length;
    hi=total?0:-1;
    if(!total){drop.classList.remove("show");drop.innerHTML="";return;}
    const cHtml=cRes.map((c,i)=>`<div class="srch-item ${i===hi?"hi":""}" data-type="country" data-ck="${c.ck}"><span class="si-hs">${c.ck}</span><span class="si-name">${(c.name||"").replace(/</g,"&lt;")}</span><span class="si-tag t-country">국가</span></div>`).join("");
    const off=cRes.length;
    const hHtml=hsRes.map((r,i)=>{const j=off+i;return `<div class="srch-item ${j===hi?"hi":""}" data-type="hs" data-hs="${r.hs}"><span class="si-hs">${r.hs}</span><span class="si-name">${(r.name||"").replace(/</g,"&lt;")||"(이름 없음)"}</span><span class="si-tag t-${r.type}">HS6</span></div>`}).join("");
    drop.innerHTML=cHtml+hHtml;
    drop.classList.add("show");
    drop.querySelectorAll(".srch-item").forEach(el=>{el.onmousedown=e=>{e.preventDefault();_cDispatchItem(el);}});
  }
  inp.addEventListener("input",render);
  inp.addEventListener("focus",render);
  inp.addEventListener("blur",()=>setTimeout(()=>drop.classList.remove("show"),120));
  inp.addEventListener("keydown",e=>{
    const items=drop.querySelectorAll(".srch-item");
    if(e.key==="Enter"){e.preventDefault();if(hi>=0&&items[hi])_cDispatchItem(items[hi]);else cFocusSubmit();}
    else if(e.key==="ArrowDown"){e.preventDefault();if(items.length){if(hi>=0)items[hi].classList.remove("hi");hi=Math.min(hi+1,items.length-1);items[hi].classList.add("hi");}}
    else if(e.key==="ArrowUp"){e.preventDefault();if(items.length){if(hi>=0)items[hi].classList.remove("hi");hi=Math.max(hi-1,0);items[hi].classList.add("hi");}}
    else if(e.key==="Escape"){drop.classList.remove("show");inp.blur();}
  });
}

// ===== Choropleth 세계지도 (국가별 탭 헤더, 태평양 중심) =====
const MAP_W=1200,MAP_H=480;
const MAP_LAT_TOP=85,MAP_LAT_BOT=-58; // 표시 위도 범위 (남극은 잘라내고 그린란드/북극 끝까지 포함)
const MAP_CENTER_LNG=150; // 태평양 중심 (한국 ~127°E 약간 우측)
const MAP_SX=MAP_W/360;
const MAP_SY=MAP_H/(MAP_LAT_TOP-MAP_LAT_BOT);
function shiftLng(lng){return ((lng-MAP_CENTER_LNG+540)%360)-180}
function ll2screen(lng,lat){return [(shiftLng(lng)+180)*MAP_SX,(MAP_LAT_TOP-lat)*MAP_SY]}
// 폴리곤 ring을 lng wrap 발생 지점에서 분할
function splitWrap(ring){
  const segs=[[]];let prev=null;
  for(const p of ring){
    const sl=shiftLng(p[0]);
    if(prev!==null&&Math.abs(sl-prev)>180){segs.push([])}
    segs[segs.length-1].push([sl,p[1]]);
    prev=sl;
  }
  return segs.filter(s=>s.length>=3);
}
async function loadMapAssets(){
  if(MAP_LOAD)return MAP_LOAD;
  MAP_LOAD=Promise.all([
    fetch("/static/world.geo.json").then(r=>r.json()),
    fetch("/static/country_meta.json").then(r=>r.json())
  ]).then(([geo,meta])=>{
    MAP_GEO=geo;MAP_META=meta;
    // alpha-3 → alpha-2 역매핑 (feature.id가 alpha-3)
    const a3to2={};
    for(const[a2,v] of Object.entries(meta))if(v&&v.a3)a3to2[v.a3]=a2;
    MAP_GEO._a3to2=a3to2;
    return [geo,meta];
  });
  return MAP_LOAD;
}
function buildMapTotals(idx){
  const out={};
  for(const[ck,v] of Object.entries(idx||{})){
    let s=0;for(const it of v.items||[])for(const x of Object.values(it.exp||{}))s+=(x||0);
    if(s>0)out[ck]={name:v.name,total:s};
  }
  return out;
}
function rMap3D(wrap,idx,subLabel){
  wrap.innerHTML='<div class="map3d-status">지도 로딩…</div>';
  loadMapAssets().then(([geo,meta])=>{
    const totals=buildMapTotals(idx);
    const ckArr=Object.keys(totals).filter(ck=>meta[ck]);
    const vals=ckArr.map(ck=>totals[ck].total);
    const hasData=vals.length>0;
    const maxV=hasData?Math.max(...vals):0;
    const minV=hasData?Math.min(...vals):0;
    const sumV=vals.reduce((a,b)=>a+b,0);
    const lgMax=Math.log10(maxV+1),lgMin=Math.log10(Math.max(minV,1));
    const lgSpan=lgMax-lgMin||1;
    const linDen=maxV||1;
    // 40% log + 60% linear 혼합 — 상위 국가 도드라지면서 하위도 살아있음
    const MIX=0.4;
    function tNorm(v){
      const tLog=Math.min(1,Math.max(0,(Math.log10(Math.max(v,1))-lgMin)/lgSpan));
      const tLin=Math.min(1,Math.max(0,v/linDen));
      return MIX*tLog+(1-MIX)*tLin;
    }
    // 색: 데이터 없는 국가는 어두운 회색, 있으면 cyan log scale
    function landFill(v){
      if(!v||v<=0)return null; // null = no-data class 처리
      const t=tNorm(v);
      // 옅은 민트 → 네온 spring-green (다크 테마 형광빛)
      const L=86-t*32; // 86~54% (top을 살짝 더 밝게 = neon 발광감)
      const S=12+t*88; // 12~100% (작음=거의 무채 → 큼=풀채도)
      const H=150+t*8; // 150→158
      return `hsl(${H},${S}%,${L}%)`;
    }
    const a3to2=geo._a3to2||{};
    // alpha-2 → polygon points 배열들 묶기
    const byCk={}; // {ck: [pointsStr, ...]}
    for(const feat of (geo.features||[])){
      const a3=feat.id;const a2=a3to2[a3];
      const g=feat.geometry;if(!g)continue;
      const polys=g.type==="Polygon"?[g.coordinates]:(g.type==="MultiPolygon"?g.coordinates:null);
      if(!polys)continue;
      const key=a2||("_"+(a3||"x"));
      if(!byCk[key])byCk[key]=[];
      for(const poly of polys){
        const ring=poly[0];if(!ring||ring.length<3)continue;
        for(const seg of splitWrap(ring)){
          // seg: [[shiftedLng,lat],...] — 이미 shift 적용됨, 화면 좌표 직접 계산
          const pts=seg.map(p=>{const x=(p[0]+180)*MAP_SX;const y=(MAP_LAT_TOP-p[1])*MAP_SY;return x.toFixed(1)+","+y.toFixed(1)});
          byCk[key].push(pts.join(" "));
        }
      }
    }
    const parts=[`<svg class="map3d-svg" viewBox="0 0 ${MAP_W} ${MAP_H}" preserveAspectRatio="xMidYMid meet">`];
    parts.push('<g class="map3d-land">');
    // 데이터 없는 국가 먼저 (밑에 깔리도록)
    const ordered=Object.entries(byCk).sort((a,b)=>{
      const va=(totals[a[0]]?.total)||0,vb=(totals[b[0]]?.total)||0;
      return va-vb; // 작은 값 먼저 (위에 큰 값이 그려져도 영역이 안 겹치지만 hover stack 자연스럽게)
    });
    for(const[ck,polyList] of ordered){
      const t=totals[ck];const v=t?t.total:0;
      const fill=landFill(v);
      const cls=fill?"map3d-c":"map3d-c no-data";
      const fillAttr=fill?` fill="${fill}"`:"";
      const sh=(hasData&&v>0)?(v/sumV*100).toFixed(2):"0";
      const nmKo=t?(CNAMES[ck]||t.name):(meta[ck]?(CNAMES[ck]||meta[ck].name):ck);
      const nmEsc=(nmKo||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
      parts.push(`<g class="${cls}" data-ck="${ck}" data-name="${nmEsc}" data-val="${v}" data-share="${sh}">`);
      for(const pts of polyList)parts.push(`<polygon points="${pts}"${fillAttr}/>`);
      parts.push('</g>');
    }
    parts.push('</g>');
    parts.push('</svg>');
    const subEsc=(subLabel||"전체 합산").replace(/&/g,"&amp;").replace(/</g,"&lt;");
    parts.push(`<div class="map3d-cap">세계 수출 분포 · <b>${subEsc}</b> · ${ckArr.length}개국 · 합계 ${fn(sumV)}</div>`);
    if(hasData)parts.push(`<div class="map3d-leg"><span class="lg-end"><span class="lg-tag">적음</span>${fn(minV)}</span><span class="lg-bar"></span><span class="lg-end hi"><span class="lg-tag">많음</span>${fn(maxV)}</span></div>`);
    parts.push('<div class="map3d-tt" id="map3dTT"></div>');
    wrap.innerHTML=parts.join("");
    // 인터랙션
    const tt=wrap.querySelector("#map3dTT");
    wrap.querySelectorAll(".map3d-c:not(.no-data)").forEach(g=>{
      g.addEventListener("mousemove",ev=>{
        const r=wrap.getBoundingClientRect();
        const x=ev.clientX-r.left,y=ev.clientY-r.top;
        const ck=g.getAttribute("data-ck"),nm=g.getAttribute("data-name");
        const val=parseFloat(g.getAttribute("data-val")),sh=g.getAttribute("data-share");
        tt.innerHTML=`<div class="tt-n">${nm} <span style="color:var(--t4);font-weight:400">${ck}</span></div><div class="tt-v">수출 ${fn(val)}</div><div class="tt-h">전체 비중 ${sh}% · 클릭하여 선택</div>`;
        tt.classList.add("show");
        const tw=tt.offsetWidth,th=tt.offsetHeight;
        let lx=x+14,ly=y+14;
        if(lx+tw>r.width)lx=x-tw-14;
        if(ly+th>r.height)ly=y-th-14;
        tt.style.left=lx+"px";tt.style.top=ly+"px";
      });
      g.addEventListener("mouseleave",()=>tt.classList.remove("show"));
      g.addEventListener("click",()=>{cSel=g.getAttribute("data-ck");rMain()});
    });
  }).catch(err=>{
    wrap.innerHTML=`<div class="map3d-status">지도 로드 실패: ${(err&&err.message)||err}</div>`;
  });
}

// ===== 한국 시군구 지도 (🏭 국내 지역별 탭) =====
const KMAP_W=600,KMAP_H=580;
const KMAP_LNG_L=124.5,KMAP_LNG_R=131.9;
const KMAP_LAT_T=38.7,KMAP_LAT_B=33.0;
const KMAP_SX=KMAP_W/(KMAP_LNG_R-KMAP_LNG_L);
const KMAP_SY=KMAP_H/(KMAP_LAT_T-KMAP_LAT_B);
// 데이터 키 ↔ geojson canon 매칭 보조 (행정구역 개편 반영)
const REGION_ALIAS={"경기도 여주군":"경기도 여주시","경기도 포천군":"경기도 포천시","인천광역시 미추홀구":"인천광역시 남구","대구광역시 군위군":"경상북도 군위군","세종특별자치시":"세종특별자치시 세종시"};
const SIDO_SHORT2FULL={"서울":"서울특별시","부산":"부산광역시","대구":"대구광역시","인천":"인천광역시","광주":"광주광역시","대전":"대전광역시","울산":"울산광역시","세종":"세종특별자치시","경기":"경기도","강원":"강원특별자치도","충북":"충청북도","충남":"충청남도","전북":"전북특별자치도","전남":"전라남도","경북":"경상북도","경남":"경상남도","제주":"제주특별자치도"};
function regionKeyToCanon(rk){
  if(!rk)return null;
  let s=rk;
  // 4-5자리 숫자 코드: RNAMES로 짧은이름 조회 → 시도 prefix 풀이
  if(/^\d{4,5}$/.test(rk)){
    const short=RNAMES[rk];if(!short)return null;
    const sp=short.split(" ");if(sp.length<2)return null;
    const full=SIDO_SHORT2FULL[sp[0]]||sp[0];
    s=full+" "+sp.slice(1).join(" ");
  }
  return REGION_ALIAS[s]||s;
}
async function loadKoreaMap(){
  if(KMAP_LOAD)return KMAP_LOAD;
  KMAP_LOAD=fetch("/static/korea_sgg.geo.json").then(r=>r.json()).then(geo=>{KMAP_GEO=geo;return geo});
  return KMAP_LOAD;
}
function buildSigunguByCanon(idx){
  // {canon: {total, dataKeys:[{code,name,tot}]}}
  let allM=new Set();
  for(const v of Object.values(idx||{}))for(const it of v.items)for(const m of Object.keys(it.exp||{}))allM.add(m);
  const months=[...allM].sort();const lm=months[months.length-1];
  const byCanon={};
  for(const[rk,v] of Object.entries(idx||{})){
    const c=regionKeyToCanon(rk);if(!c)continue;
    let tot=0;for(const it of v.items)tot+=(it.exp[lm]||0);
    if(!byCanon[c])byCanon[c]={total:0,dataKeys:[]};
    byCanon[c].total+=tot;
    byCanon[c].dataKeys.push({code:rk,name:v.name,tot});
  }
  for(const c of Object.keys(byCanon))byCanon[c].dataKeys.sort((a,b)=>b.tot-a.tot);
  return byCanon;
}
function rMapKorea(wrap,idx){
  wrap.innerHTML='<div class="map3d-status">지도 로딩…</div>';
  loadKoreaMap().then(geo=>{
    const byCanon=buildSigunguByCanon(idx);
    const vals=Object.values(byCanon).map(v=>v.total).filter(v=>v>0);
    const hasData=vals.length>0;
    const maxV=hasData?Math.max(...vals):0;
    const minV=hasData?Math.min(...vals):0;
    const sumV=vals.reduce((a,b)=>a+b,0);
    const lgMax=Math.log10(maxV+1),lgMin=Math.log10(Math.max(minV,1));
    const lgSpan=lgMax-lgMin||1;
    const linDen=maxV||1;
    const MIX=0.4;
    function tNorm(v){
      const tLog=Math.min(1,Math.max(0,(Math.log10(Math.max(v,1))-lgMin)/lgSpan));
      const tLin=Math.min(1,Math.max(0,v/linDen));
      return MIX*tLog+(1-MIX)*tLin;
    }
    function landFill(v){
      if(!v||v<=0)return null;
      const t=tNorm(v);
      const L=86-t*32;const S=12+t*88;const H=150+t*8;
      return `hsl(${H},${S}%,${L}%)`;
    }
    function projXY(p){const x=(p[0]-KMAP_LNG_L)*KMAP_SX;const y=(KMAP_LAT_T-p[1])*KMAP_SY;return x.toFixed(1)+","+y.toFixed(1)}
    // geojson features를 canon별로 묶기 (도농복합시 자치구는 parent로 합쳐짐)
    const byCanonPolys={};
    for(const feat of (geo.features||[])){
      const c=feat.properties.canon;const fl=feat.properties.full;const nm=feat.properties.name;
      const g=feat.geometry;if(!g)continue;
      const polys=g.type==="Polygon"?[g.coordinates]:(g.type==="MultiPolygon"?g.coordinates:null);
      if(!polys)continue;
      if(!byCanonPolys[c])byCanonPolys[c]={display:fl.split(" ").slice(1).join(" ")||nm,sido:fl.split(" ")[0],polys:[]};
      for(const poly of polys){
        const ring=poly[0];if(!ring||ring.length<3)continue;
        byCanonPolys[c].polys.push(ring.map(projXY).join(" "));
      }
    }
    // 표시명 보정 (parent canon은 display를 parent 시 이름으로)
    for(const c of Object.keys(byCanonPolys)){
      const tail=c.split(" ").slice(1).join(" ");
      if(tail)byCanonPolys[c].display=tail;
    }
    const parts=[`<svg class="map3d-svg" viewBox="0 0 ${KMAP_W} ${KMAP_H}" preserveAspectRatio="xMidYMid meet">`];
    parts.push('<g class="map3d-land">');
    // 작은 값 먼저 그려서 큰 값이 위에
    const ordered=Object.entries(byCanonPolys).sort((a,b)=>((byCanon[a[0]]?.total)||0)-((byCanon[b[0]]?.total)||0));
    for(const[c,info] of ordered){
      const t=byCanon[c];const v=t?t.total:0;
      const fill=landFill(v);
      const cls=fill?"map3d-c":"map3d-c no-data";
      const fillAttr=fill?` fill="${fill}"`:"";
      const sh=(hasData&&v>0)?(v/sumV*100).toFixed(2):"0";
      const dispEsc=info.display.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
      const sidoEsc=info.sido.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
      parts.push(`<g class="${cls}" data-canon="${c.replace(/"/g,"&quot;")}" data-disp="${dispEsc}" data-sido="${sidoEsc}" data-val="${v}" data-share="${sh}">`);
      for(const pts of info.polys)parts.push(`<polygon points="${pts}"${fillAttr}/>`);
      parts.push('</g>');
    }
    parts.push('</g>');
    parts.push('</svg>');
    const matchedCnt=Object.keys(byCanon).filter(c=>byCanonPolys[c]&&byCanon[c].total>0).length;
    parts.push(`<div class="map3d-cap">국내 시군구 수출 분포 · <b>${matchedCnt}개 지역</b> · 합계 ${fn(sumV)}</div>`);
    if(hasData)parts.push(`<div class="map3d-leg"><span class="lg-end"><span class="lg-tag">적음</span>${fn(minV)}</span><span class="lg-bar"></span><span class="lg-end hi"><span class="lg-tag">많음</span>${fn(maxV)}</span></div>`);
    parts.push('<div class="map3d-tt" id="kmapTT"></div>');
    wrap.innerHTML=parts.join("");
    const tt=wrap.querySelector("#kmapTT");
    wrap.querySelectorAll(".map3d-c:not(.no-data)").forEach(g=>{
      g.addEventListener("mousemove",ev=>{
        const r=wrap.getBoundingClientRect();

function rSetupSearch(arr){
  const inp=document.getElementById("rSrchInput");const drop=document.getElementById("rSrchDrop");
  if(!inp||!drop)return;
  let hi=-1;
  function render(){
    const q=(inp.value||"").trim().toLowerCase();
    let res;
    if(!q){res=arr.slice(0,15)}
    else{res=arr.filter(l=>(l.name||"").toLowerCase().includes(q)||(l.code||"").toLowerCase().includes(q)).slice(0,15)}
    hi=res.length?0:-1;
    if(!res.length){drop.innerHTML=`<div style="padding:10px 14px;color:var(--t4);font-size:11px">일치하는 지역 없음</div>`;drop.classList.add("show");return;}
    drop.innerHTML=res.map((l,i)=>`<div class="srch-item ${i===hi?"hi":""}" data-code="${l.code.replace(/"/g,"&quot;")}"><span class="si-name">${(l.name||"").replace(/</g,"&lt;")}</span><span class="si-hs" style="color:var(--t4)">${fn(l.tot)}</span></div>`).join("");
    drop.classList.add("show");
    drop.querySelectorAll(".srch-item").forEach(el=>{el.onmousedown=e=>{e.preventDefault();rSel=el.getAttribute("data-code");rItemSel=null;rMain();}});
  }
  inp.addEventListener("input",render);
  inp.addEventListener("focus",render);
  inp.addEventListener("blur",()=>setTimeout(()=>drop.classList.remove("show"),120));
  inp.addEventListener("keydown",e=>{
    const items=drop.querySelectorAll(".srch-item[data-code]");
    if(e.key==="Enter"){e.preventDefault();if(hi>=0&&items[hi]){rSel=items[hi].getAttribute("data-code");rItemSel=null;rMain();}}
    else if(e.key==="ArrowDown"){e.preventDefault();if(items.length){if(hi>=0)items[hi].classList.remove("hi");hi=Math.min(hi+1,items.length-1);items[hi].classList.add("hi");}}
    else if(e.key==="ArrowUp"){e.preventDefault();if(items.length){if(hi>=0)items[hi].classList.remove("hi");hi=Math.max(hi-1,0);items[hi].classList.add("hi");}}
    else if(e.key==="Escape"){drop.classList.remove("show");inp.blur();}
  });
}

// ===== HS 검색 =====
function buildSearchIndex(){
  SEARCH_INDEX=[];
  const seen=new Set();
  for(const[hs,d]of Object.entries(D.items||{})){
    SEARCH_INDEX.push({hs,name:d.name||"",type:"item"});
    seen.add(hs);
  }
  const hs4FromRank=new Set();
  for(const[hs,d]of Object.entries(D.ranking_6d||{})){
    if(!seen.has(hs)){
      SEARCH_INDEX.push({hs,name:d.name||"",type:"rank"});
      seen.add(hs);
    }
    if(/^\d{6}$/.test(hs))hs4FromRank.add(hs.slice(0,4));
  }
  const N4=D.hs4_names||{};
  for(const hs4 of hs4FromRank){
    if(seen.has(hs4))continue;
    SEARCH_INDEX.push({hs:hs4,name:N4[hs4]||"",type:"rank"});
    seen.add(hs4);
  }
}
function searchHS(q){
  q=(q||"").trim();
  if(!q)return[];
  const lq=q.toLowerCase();
  const isNum=/^\d+$/.test(q);
  const out=[];
  for(const r of SEARCH_INDEX){
    let score=-1;
    if(isNum){
      if(r.hs.startsWith(q))score=100-Math.abs(r.hs.length-q.length);
    }else{
      const nm=(r.name||"").toLowerCase();
      if(nm&&nm.includes(lq))score=nm.startsWith(lq)?90:50;
    }
    if(score>=0)out.push({...r,score});
  }
  out.sort((a,b)=>b.score-a.score||a.hs.length-b.hs.length||a.hs.localeCompare(b.hs));
  return out.slice(0,12);
}
function searchGo(hs){
  hs=(hs||"").toString().trim();
  if(!hs)return;
  selSearch=hs;
  tab="search";
  const inp=document.getElementById("srchInput");
  if(inp)inp.value=hs;
  const drop=document.getElementById("srchDrop");
  if(drop){drop.classList.remove("show");drop.innerHTML="";}
  rTabs();rMain();
}
function searchClose(){
  selSearch=null;
  if(tab==="search")tab="overview";
  const inp=document.getElementById("srchInput");
  if(inp)inp.value="";
  rTabs();rMain();
}
function searchSubmit(){
  const inp=document.getElementById("srchInput");
  if(!inp)return;
  const q=(inp.value||"").trim();
  if(!q)return;
  if(/^[A-Z0-9]{2,10}$/i.test(q)){searchGo(q.toUpperCase());return;}
  const r=searchHS(q);
  if(r.length)searchGo(r[0].hs);
}
function setupSearch(){
  const inp=document.getElementById("srchInput");
  const drop=document.getElementById("srchDrop");
  if(!inp||!drop)return;
  let hi=-1;
  function render(){
    const res=searchHS(inp.value);
    hi=res.length?0:-1;
    if(!res.length){drop.classList.remove("show");drop.innerHTML="";return;}
    drop.innerHTML=res.map((r,i)=>`<div class="srch-item ${i===hi?"hi":""}" data-hs="${r.hs}"><span class="si-hs">${r.hs}</span><span class="si-name">${(r.name||"").replace(/</g,"&lt;")||"(이름 없음)"}</span><span class="si-tag t-${r.type}">${r.type==="item"?"품목":"HS6"}</span></div>`).join("");
    drop.classList.add("show");
    drop.querySelectorAll(".srch-item").forEach(el=>{el.onmousedown=e=>{e.preventDefault();searchGo(el.dataset.hs);}});
  }
  inp.addEventListener("input",render);
  inp.addEventListener("focus",render);
  inp.addEventListener("blur",()=>setTimeout(()=>drop.classList.remove("show"),120));
  inp.addEventListener("keydown",e=>{
    const items=drop.querySelectorAll(".srch-item");

    setTimeout(()=>{cEntries.slice(0,6).forEach(([k,v],i)=>{mkBarPrice("rc_"+i,months,v.exp,v.wgt,"rgba(45,212,191,.3)")})},50);
  }else{
    // 삼양 탭
    const sam=d.samyang||{};const locs=sam.locations||sam;const locEntries=Object.entries(locs);
    // 합계 계산
    const samTotal={};
    locEntries.forEach(([k,v])=>{for(const[ym,val]of Object.entries(v.exp||{})){samTotal[ym]=(samTotal[ym]||0)+val}});
    h+='<div class="st"><span class="d" style="background:var(--pk)"></span>삼양식품 수출</div>';
    h+='<div class="cg"><div class="cb"><h4>월별 합산 수출액 (USD)</h4><canvas id="sam_total"></canvas></div><div class="cb"><h4>분기별 합산 수출액 (USD)</h4><canvas id="sam_quarter"></canvas></div></div>';
    // 지역별 차트
    h+='<div class="st"><span class="d" style="background:var(--am)"></span>사업장별 수출</div>';
    h+='<div class="cg">';
    locEntries.forEach(([k,v],i)=>{h+=`<div class="cb"><h4>${v.name}</h4><canvas id="sam_${i}"></canvas></div>`});
    h+='</div>';
    // 테이블
    const rm=months.slice(-5);const rr=[...rm].reverse();
    h+='<div class="ts"><table class="dt"><thead><tr><th>#</th><th>사업장</th>';rr.forEach((m,j)=>h+=`<th${j===0?' style="color:var(--t1)"':''}>${fy(m)}</th>`);h+='<th>MoM</th><th>YoY</th></tr></thead><tbody>';
    h+=`<tr style="font-weight:700;background:rgba(244,114,182,.04)"><td>-</td><td>합계</td>`;rr.forEach((m,j)=>h+=`<td${j===0?' style="color:var(--t1)"':''}>${fn(samTotal[m]||0)}</td>`);h+=`<td>${chB(mom(samTotal,lm))}</td><td>${chB(yoy(samTotal,lm))}</td></tr>`;
    locEntries.forEach(([k,v],i)=>{h+=`<tr><td>${i+1}</td><td>${v.name}</td>`;rr.forEach((m,j)=>h+=`<td${j===0?' style="color:var(--t1)"':''}>${fn(v.exp[m]||0)}</td>`);h+=`<td>${chB(mom(v.exp,lm))}</td><td>${chB(yoy(v.exp,lm))}</td></tr>`});
    h+='</tbody></table></div>';
    el.innerHTML=h;
    // YoY 계산 헬퍼 (월별 데이터 → YoY% 배열)
    function calcYoYArr(data,ms){return ms.map(m=>{const y=parseInt(m.slice(0,4)),mo=m.slice(4);const pm=String(y-1)+mo;const cur=data[m]||0,prev=data[pm]||0;return prev>0?((cur-prev)/prev*100):null})}
    // 합계 차트 (막대 + YoY 라인)
    const totCtx=document.getElementById("sam_total");
    if(totCtx){
      const yoyArr=calcYoYArr(samTotal,months);
      charts.push(new Chart(totCtx,{type:"bar",data:{labels:months.map(fy),datasets:[
        {type:"bar",label:"수출액 (USD)",data:months.map(m=>samTotal[m]||0),backgroundColor:"rgba(244,114,182,.3)",borderColor:"#f472b6",borderWidth:1,borderRadius:3,yAxisID:"y"},
        {type:"line",label:"YoY (%)",data:yoyArr,borderColor:"#22d3ee",backgroundColor:"rgba(34,211,238,.1)",borderWidth:2,tension:.3,pointRadius:2.5,pointBackgroundColor:"#22d3ee",yAxisID:"y1",spanGaps:true}
      ]},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:10,color:"#c8d4e6",font:{size:10}}},tooltip:{mode:"index",intersect:false,callbacks:{label:function(c){if(c.dataset.yAxisID==="y1")return c.parsed.y!=null?"YoY: "+c.parsed.y.toFixed(1)+"%":"";return c.dataset.label+": "+fn(c.parsed.y)}}}},scales:{y:{position:"left",ticks:{callback:v=>fn(v),color:"#a4b2c8"}},y1:{position:"right",grid:{display:false},ticks:{callback:v=>v.toFixed(0)+"%",color:"#a4b2c8"},display:true},x:{grid:{display:false},ticks:{color:"#8898b0"}}}}}))
    }
    // 분기별 차트 (막대 + QoQ 라인)
    const qCtx=document.getElementById("sam_quarter");
    if(qCtx){
      const qMap={};
      months.forEach(m=>{const y=m.slice(2,4),mo=parseInt(m.slice(4));const q=mo<=3?1:mo<=6?2:mo<=9?3:4;const k=q+"Q"+y;if(!qMap[k])qMap[k]={label:k,val:0,sort:parseInt(m.slice(0,4))*10+q};qMap[k].val+=(samTotal[m]||0)});
      const qArr=Object.values(qMap).sort((a,b)=>a.sort-b.sort);
      const qoqArr=qArr.map((q,i)=>i>0&&qArr[i-1].val>0?((q.val-qArr[i-1].val)/qArr[i-1].val*100):null);
      charts.push(new Chart(qCtx,{type:"bar",data:{labels:qArr.map(q=>q.label),datasets:[
        {type:"bar",label:"분기 수출액 (USD)",data:qArr.map(q=>q.val),backgroundColor:"rgba(168,85,247,.3)",borderColor:"#a855f7",borderWidth:1,borderRadius:3,yAxisID:"y"},
        {type:"line",label:"QoQ (%)",data:qoqArr,borderColor:"#34d399",backgroundColor:"rgba(52,211,153,.1)",borderWidth:2,tension:.3,pointRadius:3,pointBackgroundColor:"#34d399",yAxisID:"y1",spanGaps:true}
      ]},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:10,color:"#c8d4e6",font:{size:10}}},tooltip:{mode:"index",intersect:false,callbacks:{label:function(c){if(c.dataset.yAxisID==="y1")return c.parsed.y!=null?"QoQ: "+c.parsed.y.toFixed(1)+"%":"";return c.dataset.label+": "+fn(c.parsed.y)}}}},scales:{y:{position:"left",ticks:{callback:v=>fn(v),color:"#a4b2c8"}},y1:{position:"right",grid:{display:false},ticks:{callback:v=>v.toFixed(0)+"%",color:"#a4b2c8"},display:true},x:{grid:{display:false},ticks:{color:"#8898b0"}}}}}))
    }
    // 지역별 차트 (막대 + YoY 라인)
    setTimeout(()=>{locEntries.forEach(([k,v],i)=>{const ctx=document.getElementById("sam_"+i);if(!ctx)return;
      const locYoY=calcYoYArr(v.exp||{},months);
      charts.push(new Chart(ctx,{type:"bar",data:{labels:months.map(fy),datasets:[
        {type:"bar",label:v.name+" (USD)",data:months.map(m=>v.exp[m]||0),backgroundColor:"rgba(232,168,48,.3)",borderColor:"#e8a830",borderWidth:1,borderRadius:3,yAxisID:"y"},
        {type:"line",label:"YoY (%)",data:locYoY,borderColor:"#22d3ee",backgroundColor:"rgba(34,211,238,.1)",borderWidth:2,tension:.3,pointRadius:2,pointBackgroundColor:"#22d3ee",yAxisID:"y1",spanGaps:true}
      ]},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:10,color:"#c8d4e6",font:{size:10}}},tooltip:{mode:"index",intersect:false,callbacks:{label:function(c){if(c.dataset.yAxisID==="y1")return c.parsed.y!=null?"YoY: "+c.parsed.y.toFixed(1)+"%":"";return c.dataset.label+": "+fn(c.parsed.y)}}}},scales:{y:{position:"left",ticks:{callback:v=>fn(v),color:"#a4b2c8"}},y1:{position:"right",grid:{display:false},ticks:{callback:v=>v.toFixed(0)+"%",color:"#a4b2c8"},display:true},x:{grid:{display:false},ticks:{color:"#8898b0"}}}}}))
    })},50);
  }
}

// 데이터 로드: API 서버 → JSON 파일 → DEMO 폴백
// ===== 기업별 확정치 (시군구→수출국 세분화) =====

  h+=`<div class="ts"><table class="dt"><thead><tr><th>#</th><th style="text-align:left">기업</th><th style="text-align:left">분류</th><th style="text-align:left">HS</th><th style="text-align:left">시군구</th><th>수출국</th><th>2026 누적</th><th>2025 전체</th></tr></thead><tbody>`;

  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
  const ctx=document.getElementById("cf_bar");
  if(ctx)charts.push(new Chart(ctx,{type:"bar",data:{labels:cs.map(c=>c.name),datasets:[{data:cs.map(c=>c.ex_2026),backgroundColor:cs.map((c,i)=>CL[i%CL.length]+"99"),borderColor:cs.map((c,i)=>CL[i%CL.length]),borderWidth:1,borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"$"+fn(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>fn(v),color:"#a4b2c8"},grid:{color:"rgba(255,255,255,.04)"}},x:{ticks:{color:"#c8d4e6",font:{size:10}},grid:{display:false}}}}}));
}
function rConfirmedCompany(el,c){
  const rows=c.rows||[];
  // 원화 금액 → 조/억/만 (DART 재무 표시용)
  const wKR=v=>{if(v==null)return"—";const a=Math.abs(v),s=v<0?"-":"";if(a>=1e12)return s+(a/1e12).toFixed(1)+"조";if(a>=1e8)return s+Math.round(a/1e8).toLocaleString()+"억";if(a>=1e4)return s+Math.round(a/1e4).toLocaleString()+"만";return s+Math.round(a).toLocaleString();};
  let h=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap"><button class="cs-clr" onclick="confBack()">← 기업 목록</button><span style="font-size:18px;font-weight:800;font-family:'Noto Sans KR'">${c.name}</span>${c.preset?'<span style="background:rgba(232,168,48,.14);border:1px solid var(--am);color:var(--am);padding:3px 8px;border-radius:5px;font-size:10px">★ 사전지정국</span>':''}<span style="color:var(--t4);font-size:12px">${c.category}</span></div>`;
  const topShare=(c.has_ww&&c.ex_2026>0&&c.ex_2026_top!=null)?Math.round(c.ex_2026_top/c.ex_2026*100):null;
  h+=`<div style="color:var(--t4);font-size:11px;margin:0 0 14px;font-family:'Fira Code',monospace">HS ${c.hs_list.join(", ")} · ${c.sigungu_list.join(", ")} · 2026 누적 ${fn(c.ex_2026)}<span style="color:var(--t5)"> (전세계 전체${topShare!=null?`, 표시 주요국 ${fn(c.ex_2026_top)}·${topShare}%`:''})</span> · 2025 전체 ${fn(c.ex_2025)}</div>`;
  // ===== DART 재무: 매출/영업이익 (있을 때만) =====
  const finA=(c.financials&&c.financials.annual)||null;
  if(finA){
    const fy=Object.keys(finA).sort();
    const lastY=fy[fy.length-1], prevY=fy.length>1?fy[fy.length-2]:null;
    const lr=finA[lastY].rev, lo=finA[lastY].op;
    const pr=prevY?finA[prevY].rev:null, po=prevY?finA[prevY].op:null;
    const mrg=(lr&&lo!=null)?lo/lr*100:null;
    const yoy=(a,b)=>(a!=null&&b!=null&&b!==0)?(a-b)/Math.abs(b)*100:null;
    const rYoY=yoy(lr,pr), oYoY=yoy(lo,po);
    const chip=v=>v==null?'<span style="color:var(--t4)">—</span>':`<span style="color:${v>=0?'var(--gn)':'var(--rd)'}">${v>=0?'▲':'▼'} ${Math.abs(v).toFixed(1)}%</span>`;
    const kpi=(lab,val,sub)=>`<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:8px 11px"><div style="font-size:9.5px;color:var(--t3)">${lab}</div><div class="mono" style="font-size:16px;font-weight:700;color:var(--t1);margin:1px 0">${val}</div><div class="mono" style="font-size:9.5px">${sub}</div></div>`;
    const fin=c.financials;
    const hasQ=fin.quarterly&&Object.keys(fin.quarterly).length>0;
    if(!hasQ&&cfFinMode==="quarter")cfFinMode="year";   // 분기 없으면 연간으로
    const finTog=hasQ?`<div style="display:flex;gap:4px"><button class="pill ${cfFinMode!=="quarter"?"on":""}" onclick="cfFinMode='year';rMain()">연간</button><button class="pill ${cfFinMode==="quarter"?"on":""}" onclick="cfFinMode='quarter';rMain()">분기</button></div>`:"";
    h+=`<div class="cg"><div class="cb w"><div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:9px"><h4 style="margin:0">📈 재무실적 · 매출·영업이익 (원)</h4><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">${finTog}<div class="mono" style="font-size:10px;color:var(--t4)">DART ${fin.dart_name||c.name}${fin.stock_code?' · '+fin.stock_code:''}${fin.fs_div?' · '+(fin.fs_div==='CFS'?'연결':'개별'):''}</div></div></div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:11px">${kpi(lastY+' 매출액',wKR(lr),'YoY '+chip(rYoY))}${kpi(lastY+' 영업이익',wKR(lo),'YoY '+chip(oYoY))}${kpi('영업이익률',mrg==null?'—':mrg.toFixed(1)+'%',lastY+' 기준')}</div>`;
    h+=`<canvas id="cf_fin"></canvas></div></div>`;
  }
  // ===== 월별 시계열 축 (최근 N개월, 'YYYY-MM') =====
  const wwM=c.ww_monthly||{}, wwY=c.ww_yearly||{}, useWW=!!c.has_ww;
  const mset=new Set();rows.forEach(r=>Object.keys(r.monthly||{}).forEach(k=>mset.add(k)));
  Object.keys(wwM).forEach(k=>mset.add(k));
  const MONTHS=[...mset].sort().slice(-16);                       // 최근 16개월(트레일링 1년+여유)
  const mLab=MONTHS.map(m=>m.replace("-","."));                   // 2025.05
  const mAmt=(r,m)=>+(((r.monthly||{})[m]||{}).ex_amt||0);
  // 회사 전체 월별 합 — 전세계(전국가) 합 우선, 없으면 상위국 행 합 폴백
  const mTot=MONTHS.map(m=>useWW?+(wwM[m]||0):rows.reduce((s,r)=>s+mAmt(r,m),0));
  // 국가별 월별 합 + 윈도우 내 상위국 선정
  const byCM={};rows.forEach(r=>{const cn=r.country_name;(byCM[cn]=byCM[cn]||{});MONTHS.forEach(m=>{byCM[cn][m]=(byCM[cn][m]||0)+mAmt(r,m)})});
  const topC=Object.entries(byCM).map(([cn,mm])=>({cn,tot:MONTHS.reduce((s,m)=>s+(mm[m]||0),0)})).filter(x=>x.tot>0).sort((a,b)=>b.tot-a.tot).slice(0,5).map(x=>x.cn);
  // ===== 하단용: 국가별 2026 누적 + 연도별 추이 =====
  const byC={};rows.forEach(r=>{const e=+((r.yearly["2026"]||{}).ex_amt||0);byC[r.country_name]=(byC[r.country_name]||0)+e});
  const cArr=Object.entries(byC).map(([k,v])=>({name:k,v})).sort((a,b)=>b.v-a.v);
  // ===== 연도별 누적: X=월(1~12), 라인=연도(2022~), Y=연내 누적 =====
  // 월별 소스 맵 {YYYY-MM: USD} — 전세계 우선, 없으면 상위국 행 합
  const monMap=useWW?wwM:(()=>{const o={};rows.forEach(r=>Object.entries(r.monthly||{}).forEach(([k,v])=>{o[k]=(o[k]||0)+(+((v||{}).ex_amt||0))}));return o})();
  const MN=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const cyYears=[...new Set(Object.keys(monMap).map(k=>k.slice(0,4)))].filter(y=>+y>=2022).sort();
  const mkSet=(cumulative)=>cyYears.map((y,i)=>{let cum=0;const data=MN.map((_,mi)=>{const v=monMap[`${y}-${String(mi+1).padStart(2,"0")}`];if(v==null)return null;cum+=v;return cumulative?cum:v;});return{label:y,data,borderColor:CL[i%CL.length],backgroundColor:CL[i%CL.length]+"22",borderWidth:2,tension:.25,pointRadius:1.5,spanGaps:false};});
  const ySets=mkSet(cfYMode!=="mon");   // cum=연내누적, mon=월별값
  const yModeLabel=cfYMode==="mon"?"월별":"누적";
  // --- 차트 배치: 상단 월별 → 중단 상위국 월별 → 하단 연도별/국가별누적 ---
  if(MONTHS.length)h+=`<div class="cg"><div class="cb w"><h4>월별 수출 추이 (최근 ${MONTHS.length}개월, USD${useWW?' · 전세계 전체':''})</h4><canvas id="cf_mall"></canvas></div></div>`;
  if(topC.length)h+=`<div class="cg"><div class="cb w"><h4>주요 ${topC.length}개국 월별 수출 (USD · 표시국만)</h4><canvas id="cf_mc"></canvas></div></div>`;
  h+=`<div class="cg"><div class="cb"><h4>주요국 2026 누적 수출 (USD · 표시국만)</h4><canvas id="cf_c"></canvas></div><div class="cb"><div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap"><h4 style="margin:0">연도별 ${yModeLabel} 수출 추이 (USD${useWW?' · 전세계 전체':''})</h4><div style="display:flex;gap:4px"><button class="pill ${cfYMode!=="mon"?"on":""}" onclick="cfYMode='cum';rMain()">누적</button><button class="pill ${cfYMode==="mon"?"on":""}" onclick="cfYMode='mon';rMain()">월별</button></div></div><canvas id="cf_y"></canvas></div></div>`;
  h+=`<div class="st"><span class="d" style="background:var(--am)"></span>시군구 · HS · 국가별 상세 (2026 누적 기준 정렬)</div>`;
  h+=`<div class="ts"><table class="dt"><thead><tr><th>#</th><th style="text-align:left">시군구</th><th style="text-align:left">HS</th><th style="text-align:left">국가</th><th>2026 누적</th><th>중량(t)</th><th>단가(USD/kg)</th><th>2025 전체</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const y26=r.yearly["2026"]||{};const y25=r.yearly["2025"]||{};
    const e26=+(y26.ex_amt||0),w26=+(y26.ex_wght||0);const up=w26?e26/w26:null;
    h+=`<tr><td>${i+1}</td><td style="text-align:left;font-family:'Noto Sans KR';font-size:11px">${r.sigungu}</td><td style="text-align:left" class="mono">${r.hs}</td><td style="text-align:left;font-family:'Noto Sans KR'">${r.country_name}${r.preset?' <span style="color:var(--am);font-size:9px">★</span>':''}</td><td style="color:var(--t1)">${fn(e26)}</td><td>${w26?fn(w26/1000):'—'}</td><td>${up!=null?up.toFixed(1):'—'}</td><td>${fn(+(y25.ex_amt||0))}</td></tr>`;
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
  // 1) 월별 수출 추이 (회사 전체)
  const cm=document.getElementById("cf_mall");
  if(cm)charts.push(new Chart(cm,{type:"bar",data:{labels:mLab,datasets:[{data:mTot,backgroundColor:"rgba(167,139,250,.5)",borderColor:"#a78bfa",borderWidth:1,borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"$"+fn(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>fn(v),color:"#a4b2c8"},grid:{color:"rgba(255,255,255,.04)"}},x:{ticks:{color:"#8898b0",font:{size:10}},grid:{display:false}}}}}));
  // 2) 상위국 월별 (멀티라인)
  const cmc=document.getElementById("cf_mc");
  if(cmc)charts.push(new Chart(cmc,{type:"line",data:{labels:mLab,datasets:topC.map((cn,i)=>({label:cn,data:MONTHS.map(m=>byCM[cn][m]||0),borderColor:CL[i%CL.length],backgroundColor:CL[i%CL.length]+"22",borderWidth:2,tension:.3,pointRadius:1.5}))},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,labels:{color:"#c8d4e6",font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.label+": $"+fn(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>fn(v),color:"#a4b2c8"},grid:{color:"rgba(255,255,255,.04)"}},x:{ticks:{color:"#8898b0",font:{size:10}},grid:{display:false}}}}}));
  // 3) 국가별 2026 누적 (가로막대)
  const c1=document.getElementById("cf_c");
  if(c1)charts.push(new Chart(c1,{type:"bar",data:{labels:cArr.map(x=>x.name),datasets:[{data:cArr.map(x=>x.v),backgroundColor:cArr.map((x,i)=>CL[i%CL.length]+"99"),borderColor:cArr.map((x,i)=>CL[i%CL.length]),borderWidth:1,borderRadius:3}]},options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"$"+fn(c.parsed.x)}}},scales:{x:{ticks:{callback:v=>fn(v),color:"#a4b2c8"},grid:{color:"rgba(255,255,255,.04)"}},y:{ticks:{color:"#c8d4e6",font:{size:10}},grid:{display:false}}}}}));
  // 4) 연도별 추이 (X=월, 연도별 멀티라인) — 누적/월별 토글
  const c2=document.getElementById("cf_y");
  if(c2)charts.push(new Chart(c2,{type:"line",data:{labels:MN,datasets:ySets},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,labels:{color:"#c8d4e6",font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.label+": $"+fn(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>fn(v),color:"#a4b2c8"},grid:{color:"rgba(255,255,255,.04)"}},x:{ticks:{color:"#8898b0",font:{size:10}},grid:{display:false}}}}}));
  // 5) DART 재무: 매출(막대, 좌축) + 영업이익(라인, 우축) — 연간/분기 토글
  const cf=document.getElementById("cf_fin");
  if(cf&&finA){
    const finQ=(c.financials&&c.financials.quarterly)||{};
    const useQ=cfFinMode==="quarter"&&Object.keys(finQ).length>0;
    const src=useQ?finQ:finA;
    const KS=Object.keys(src).sort();                         // 연도 또는 'YYYYQn'
    const labels=useQ?KS.map(k=>k.replace("Q"," Q")):KS;      // 2024 Q1
    charts.push(new Chart(cf,{data:{labels,datasets:[
      {type:"bar",label:"매출액",data:KS.map(k=>src[k].rev??null),yAxisID:"y",backgroundColor:"rgba(52,211,153,.45)",borderColor:"#34d399",borderWidth:1,borderRadius:3,order:2},
      {type:"line",label:"영업이익",data:KS.map(k=>src[k].op??null),yAxisID:"y1",borderColor:"#4d9fff",backgroundColor:"rgba(77,159,255,.15)",borderWidth:2,tension:.25,pointRadius:3,spanGaps:true,order:1}
    ]},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,labels:{color:"#c8d4e6",font:{size:10},boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.label+": "+wKR(c.parsed.y)}}},scales:{y:{position:"left",ticks:{callback:wKR,color:"#34d399"},grid:{color:"rgba(255,255,255,.04)"}},y1:{position:"right",ticks:{callback:wKR,color:"#4d9fff"},grid:{display:false}},x:{ticks:{color:"#8898b0",font:{size:10}},grid:{display:false}}}}}));
  }
}

(async function(){
  // 0) 확정치 기업별 데이터 (D와 독립 로드)
  try{
    const rc=await fetch("confirmed_companies.json",{cache:"no-cache"});
    if(rc.ok){const jc=await rc.json();if(jc&&jc.companies)CONF=jc;console.log("[trade] confirmed_companies.json 로드:",CONF&&CONF.n_companies,"기업")}
  }catch(e){console.log("[trade] confirmed_companies.json 없음")}
  // 1) FastAPI 서버
  try{
    const r=await fetch("/api/trade-data",{cache:"no-cache"});
    if(r.ok){
      const j=await r.json();
      if(j&&j.items&&Object.keys(j.items).length>0){
        D=j;isLive=true;
        console.log("[trade] API 서버에서 로드 완료:",j.generated_at);
        refresh();return;
      }
    }
  }catch(e){console.log("[trade] API 서버 미응답, JSON 파일 시도")}
  // 2) 정적 JSON 파일 폴백
  try{
    const r=await fetch("trade_data_v2.json",{cache:"no-cache"});
    if(r.ok){
      const j=await r.json();
      if(j&&j.items&&Object.keys(j.items).length>0){
        D=j;isLive=true;
        console.log("[trade] trade_data_v2.json 로드 완료:",j.generated_at);
      }
    }
  }catch(e){console.log("[trade] 외부 JSON 없음, DEMO 데이터 사용")}
  refresh();
})();
</script>
