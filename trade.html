<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05080e;--bg2:#0b1018;--bg3:#121a28;--bg4:#192236;--bd:#1a2436;--t1:#e6ecf6;--t2:#a4b2c8;--t3:#687891;--t4:#3c4b62;--bl:#4d9fff;--gn:#34d399;--rd:#ef5f5f;--am:#e8a830;--pr:#a78bfa;--cy:#22d3ee;--pk:#f472b6;--bl-g:rgba(77,159,255,.08);--gn-g:rgba(52,211,153,.08);--rd-g:rgba(239,95,95,.08)}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.mono{font-family:"Fira Code",monospace}
.hdr{background:linear-gradient(135deg,#080d16,#0f1724,#080d16);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;font-weight:900}.hdr h1 em{font-style:normal;background:linear-gradient(90deg,var(--bl),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:9.5px;color:var(--t4);margin-top:1px;font-family:"Fira Code"}
.hdr-r{display:flex;align-items:center;gap:8px}
.abg{padding:3px 10px;background:var(--gn-g);border:1px solid rgba(52,211,153,.22);border-radius:16px;font-size:9.5px;color:var(--gn);font-family:"Fira Code";display:flex;align-items:center;gap:5px}
.abg::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gn);animation:bk 2s ease infinite}
.abg.demo{color:var(--am);background:rgba(232,168,48,.08);border-color:rgba(232,168,48,.22)}
.abg.demo::before{background:var(--am)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
.gear-btn{width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .1s}
.gear-btn:hover{border-color:var(--bl);color:var(--bl)}

/* SETTINGS PANEL */
.settings{display:none;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;margin:10px 24px;padding:16px}
.settings.show{display:block}
.settings h3{font-size:13px;font-weight:700;margin-bottom:10px}
.settings label{font-size:11px;color:var(--t3);display:block;margin-bottom:4px}
.settings input{width:100%;max-width:500px;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--bg3);color:var(--t1);font-family:"Fira Code";font-size:12px;margin-bottom:10px}
.settings input:focus{outline:none;border-color:var(--bl)}
.settings .s-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.settings button{padding:6px 16px;border:1px solid var(--bl);border-radius:6px;background:var(--bl-g);color:var(--bl);font-size:12px;font-weight:600;cursor:pointer;font-family:"Noto Sans KR";transition:all .1s}
.settings button:hover{background:var(--bl);color:#fff}
.settings .status{font-size:11px;color:var(--t3);margin-top:6px}
.settings .status.ok{color:var(--gn)}.settings .status.err{color:var(--rd)}

.kbar{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;padding:10px 24px}
@media(max-width:900px){.kbar{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.kbar{grid-template-columns:1fr 1fr}}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.kpi:hover{border-color:var(--bl);transform:translateY(-1px)}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0;opacity:.6}
.kpi:nth-child(1)::after{background:var(--bl)}.kpi:nth-child(2)::after{background:var(--am)}.kpi:nth-child(3)::after{background:var(--pk)}.kpi:nth-child(4)::after{background:var(--cy)}.kpi:nth-child(5)::after{background:var(--pr)}.kpi:nth-child(6)::after{background:var(--gn)}
.kpi .kl{font-size:9.5px;color:var(--t3);font-weight:500;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi .kv{font-family:"Fira Code";font-size:17px;font-weight:700;margin:2px 0 1px}
.kpi .kc{font-family:"Fira Code";font-size:9.5px;display:flex;gap:6px}
.tw{padding:0 24px;border-bottom:1px solid var(--bd)}.tabs{display:flex;gap:1px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 15px;border:none;background:transparent;color:var(--t3);font-family:"Noto Sans KR";font-size:12px;font-weight:600;cursor:pointer;transition:all .1s;white-space:nowrap;border-bottom:2px solid transparent}
.tab:hover{color:var(--t2)}.tab.on{color:var(--bl);border-bottom-color:var(--bl)}
.cnt{padding:16px 24px;min-height:55vh}
.st{font-size:13px;font-weight:700;margin:16px 0 10px;display:flex;align-items:center;gap:7px}
.st .d{width:3px;height:14px;border-radius:2px;background:var(--bl)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:768px){.cg{grid-template-columns:1fr}}
.cb{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:13px}
.cb.w{grid-column:1/-1}.cb h4{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:10px}
.cb canvas{max-height:240px}
.ts{overflow-x:auto;margin-bottom:14px}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{padding:7px 8px;text-align:right;font-weight:600;color:var(--t4);border-bottom:2px solid var(--bd);font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
table.dt th:first-child{text-align:center;width:32px}table.dt th:nth-child(2){text-align:left}
table.dt td{padding:5px 8px;text-align:right;font-family:"Fira Code";font-size:11px;border-bottom:1px solid rgba(26,36,54,.6);color:var(--t2)}
table.dt td:first-child{text-align:center;color:var(--t4);font-weight:700;width:32px}
table.dt td:nth-child(2){text-align:left;font-family:"Noto Sans KR";font-weight:500;color:var(--t1)}
table.dt tr:hover{background:rgba(255,255,255,.015)}
table.dt tr.ck{cursor:pointer}table.dt tr.ck:hover{background:rgba(77,159,255,.04)}
.bar-c{position:relative}.bar-b{position:absolute;top:2px;bottom:2px;left:0;border-radius:3px;opacity:.15}
.up{color:var(--gn)}.dn{color:var(--rd)}.nt{color:var(--t4)}
.bg{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:9.5px;font-weight:600;font-family:"Fira Code"}
.bg.up{color:var(--gn);background:var(--gn-g)}.bg.dn{color:var(--rd);background:var(--rd-g)}.bg.nt{color:var(--t4)}
.pills{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.pill{padding:5px 14px;border:1px solid var(--bd);border-radius:20px;background:transparent;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;transition:all .1s;font-family:"Noto Sans KR"}
.pill:hover{border-color:var(--t3)}.pill.on{border-color:var(--bl);color:var(--bl);background:var(--bl-g)}
.pill.corp{border-color:rgba(244,114,182,.3);color:var(--pk);opacity:.55}.pill.corp:hover{border-color:var(--pk);opacity:.85}.pill.corp.on{border-color:var(--pk);color:var(--pk);background:rgba(244,114,182,.08);opacity:1}
.rank-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.rank-head .pills{margin:0}
.bbtn{padding:5px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:"Noto Sans KR";transition:all .1s}
.bbtn:hover{border-color:var(--bl);color:var(--bl)}
.ftr{padding:12px 24px;border-top:1px solid var(--bd);font-size:9px;color:var(--t4);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.loading-bar{position:fixed;top:0;left:0;height:2px;background:var(--bl);transition:width .3s;z-index:999;box-shadow:0 0 8px var(--bl)}
</style>
</head>

  url.searchParams.set("numOfRows","100");
  for(const[k,v]of Object.entries(params))url.searchParams.set(k,v);
  const r=await fetch(url);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  let items=d?.response?.body?.items;
  if(typeof items==="object"&&!Array.isArray(items))items=items.item;
  return Array.isArray(items)?items:items?[items]:[];
}

function parseYM(row){
  const y=row.trdYy||row.yr||"";const m=row.trdMm||row.mn||"";
  if(y&&m)return y+String(m).padStart(2,"0");
  return row.yyyyMm||null;
}
function flt(v){try{return parseFloat(v)||0}catch{return 0}}

function getDateRange(months=14){
  const now=new Date();
  const end=now.getFullYear()+String(now.getMonth()+1).padStart(2,"0");
  const s=new Date(now);s.setMonth(s.getMonth()-months);
  const start=s.getFullYear()+String(s.getMonth()+1).padStart(2,"0");
  return{start,end};
}

async function fetchLiveData(){
  const key=document.getElementById("apiKeyInput").value;
  if(!key){document.getElementById("apiStatus").textContent="API 키를 입력하세요";return}
  localStorage.setItem("customs_api_key",key);

  const bar=document.getElementById("loadBar");
  const st=document.getElementById("apiStatus");
  st.className="status";st.textContent="데이터 수집 중...";
  bar.style.width="5%";

  const{start,end}=getDateRange(14);
  const result={
    generated_at:new Date().toLocaleString("ko-KR")+" (LIVE)",
    period:{start,end},main_items:CFG.main_items,
    sub_items_def:CFG.sub_items,
    all_countries:CNAMES,all_regions:RNAMES,
    total:{exp:{},imp:{}},items:{}
  };

  try{
    const allItems=Object.entries(CFG.items);
    let done=0;const total=allItems.length;

    for(const[hs,cfg]of allItems){
      st.textContent=`${cfg.name} (${hs}) 수집 중... (${done+1}/${total})`;
      bar.style.width=(5+done/total*85)+"%";

      const item={name:cfg.name,total_exp:{},total_imp:{},countries:{},regions:{}};

      // 품목 전체
      try{
        const rows=await apiCall("/itemtrade/getItemtradeList",{strtYymm:start,endYymm:end,hsSgn:hs});
        for(const r of rows){
          const ym=parseYM(r);if(!ym)continue;
          item.total_exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt));
          item.total_imp[ym]=Math.round(flt(r.impDlr||r.impUsdAmt));
          result.total.exp[ym]=(result.total.exp[ym]||0)+item.total_exp[ym];
          result.total.imp[ym]=(result.total.imp[ym]||0)+item.total_imp[ym];
        }
      }catch(e){console.warn(hs,"item err:",e)}

      // 국가별
      for(const cd of (cfg.countries||[])){
        try{
          const rows=await apiCall("/nitemtrade/getNitemtradeList",{strtYymm:start,endYymm:end,hsSgn:hs,cntrCd:cd});
          const exp={};
          for(const r of rows){const ym=parseYM(r);if(ym)exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt))}
          if(Object.keys(exp).length)item.countries[cd]={name:CNAMES[cd]||cd,exp};
        }catch(e){console.warn(hs,cd,"err:",e)}
        await new Promise(r=>setTimeout(r,200));
      }

      // 시군구별 (시도별 API)
      for(const rc of (CFG.regions||[]).slice(0,15)){
        try{
          const rows=await apiCall("/locitrade/getLocitrade",{strtYymm:start,endYymm:end,hsSgn:hs,locBrkdCd:rc});
          const exp={};
          for(const r of rows){const ym=parseYM(r);if(ym)exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt))}
          if(Object.values(exp).some(v=>v>0))item.regions[rc]={name:RNAMES[rc]||rc,exp};
        }catch(e){}
        await new Promise(r=>setTimeout(r,150));
      }

      result.items[hs]=item;
      done++;
    }

    // 세부항목
    for(const[parentHs,subs]of Object.entries(CFG.sub_items||{})){
      if(!result.items[parentHs])continue;
      result.items[parentHs].sub_items={};
      for(const[scode,sname]of Object.entries(subs)){
        try{
          const rows=await apiCall("/itemtrade/getItemtradeList",{strtYymm:start,endYymm:end,hsSgn:scode});
          const exp={};
          for(const r of rows){const ym=parseYM(r);if(ym)exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt))}
          if(Object.keys(exp).length)result.items[parentHs].sub_items[scode]={name:sname,exp};
        }catch(e){}
        await new Promise(r=>setTimeout(r,200));
      }
    }

    bar.style.width="100%";
    D=result;isLive=true;
    document.getElementById("modeBadge").textContent="LIVE";
    document.getElementById("modeBadge").className="abg";
    st.className="status ok";st.textContent=`✅ 완료! ${Object.keys(result.items).length}개 품목 수집`;
    refresh();
    setTimeout(()=>{bar.style.width="0%"},1000);

  }catch(e){
    bar.style.width="0%";
    st.className="status err";
    if(e.message.includes("Failed to fetch"))st.textContent="❌ CORS 차단 — GitHub Actions를 사용하세요";
    else st.textContent="❌ 오류: "+e.message;
  }
}

      h+='<div class="ts"><table class="dt"><thead><tr><th>#</th><th>국가</th>';rr.forEach((m,j)=>h+=`<th${j===0?' style="color:var(--t1)"':''}>${fy(m)}</th>`);h+='<th>단가</th><th>MoM</th><th>YoY</th></tr></thead><tbody>';
      const totWgt=(d.total_wgt||{})[lm]||0;const totPrice=totWgt>0?"$"+(d.total_exp[lm]/totWgt).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
      h+=`<tr style="font-weight:700;background:rgba(77,159,255,.06)"><td>-</td><td>전체</td>`;rr.forEach((m,j)=>h+=`<td${j===0?' style="color:var(--t1)"':''}>${fn(d.total_exp[m]||0)}</td>`);h+=`<td class="mono" style="color:var(--am)">${totPrice}</td><td>${chB(mom(d.total_exp,lm))}</td><td>${chB(yoy(d.total_exp,lm))}</td></tr>`;
      cEntries.forEach(([k,v],i)=>{const exp=v.exp[lm]||0;const w=(v.wgt||{})[lm]||0;const price=w>0?"$"+(exp/w).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";h+=`<tr><td>${i+1}</td><td>${v.name} <span style="color:var(--t4);font-size:10px" class="mono">${k}</span></td>`;rr.forEach((m,j)=>h+=`<td${j===0?' style="color:var(--t1)"':''}>${fn(v.exp[m]||0)}</td>`);h+=`<td class="mono" style="color:var(--am)">${price}</td><td>${chB(mom(v.exp,lm))}</td><td>${chB(yoy(v.exp,lm))}</td></tr>`});
      h+='</tbody></table></div>';
    }
    el.innerHTML=h;
    mkBarPrice("rm_total",months,d.total_exp,d.total_wgt);
    setTimeout(()=>{cEntries.slice(0,6).forEach(([k,v],i)=>{mkBarPrice("rc_"+i,months,v.exp,v.wgt,"rgba(45,212,191,.3)")})},50);
  }else{
    // 삼양 탭
    const sam=d.samyang||{};const locs=sam.locations||sam;const locEntries=Object.entries(locs);
    // 합계 계산
    const samTotal={};
    locEntries.forEach(([k,v])=>{for(const[ym,val]of Object.entries(v.exp||{})){samTotal[ym]=(samTotal[ym]||0)+val}});
    h+='<div class="st"><span class="d" style="background:var(--pk)"></span>삼양식품 수출</div>';
    h+='<div class="cg"><div class="cb"><h4>월별 합산 수출액 (USD)</h4><canvas id="sam_total"></canvas></div><div class="cb"><h4>분기별 합산 수출액 (USD)</h4><canvas id="sam_quarter"></canvas></div></div>';
    // 지역별 차트
    h+='<div class="st"><span class="d" style="background:var(--am)"></span>사업장별 수출</div>';
    h+='<div class="cg">';
    locEntries.forEach(([k,v],i)=>{h+=`<div class="cb"><h4>${v.name}</h4><canvas id="sam_${i}"></canvas></div>`});
    h+='</div>';
    // 테이블
    const rm=months.slice(-5);const rr=[...rm].reverse();
    h+='<div class="ts"><table class="dt"><thead><tr><th>#</th><th>사업장</th>';rr.forEach((m,j)=>h+=`<th${j===0?' style="color:var(--t1)"':''}>${fy(m)}</th>`);h+='<th>MoM</th><th>YoY</th></tr></thead><tbody>';
    h+=`<tr style="font-weight:700;background:rgba(244,114,182,.04)"><td>-</td><td>합계</td>`;rr.forEach((m,j)=>h+=`<td${j===0?' style="color:var(--t1)"':''}>${fn(samTotal[m]||0)}</td>`);h+=`<td>${chB(mom(samTotal,lm))}</td><td>${chB(yoy(samTotal,lm))}</td></tr>`;
    locEntries.forEach(([k,v],i)=>{h+=`<tr><td>${i+1}</td><td>${v.name}</td>`;rr.forEach((m,j)=>h+=`<td${j===0?' style="color:var(--t1)"':''}>${fn(v.exp[m]||0)}</td>`);h+=`<td>${chB(mom(v.exp,lm))}</td><td>${chB(yoy(v.exp,lm))}</td></tr>`});
    h+='</tbody></table></div>';
    el.innerHTML=h;
    // YoY 계산 헬퍼 (월별 데이터 → YoY% 배열)
    function calcYoYArr(data,ms){return ms.map(m=>{const y=parseInt(m.slice(0,4)),mo=m.slice(4);const pm=String(y-1)+mo;const cur=data[m]||0,prev=data[pm]||0;return prev>0?((cur-prev)/prev*100):null})}
    // 합계 차트 (막대 + YoY 라인)
    const totCtx=document.getElementById("sam_total");
    if(totCtx){
      const yoyArr=calcYoYArr(samTotal,months);
      charts.push(new Chart(totCtx,{type:"bar",data:{labels:months.map(fy),datasets:[
        {type:"bar",label:"수출액 (USD)",data:months.map(m=>samTotal[m]||0),backgroundColor:"rgba(244,114,182,.3)",borderColor:"#f472b6",borderWidth:1,borderRadius:3,yAxisID:"y"},
        {type:"line",label:"YoY (%)",data:yoyArr,borderColor:"#22d3ee",backgroundColor:"rgba(34,211,238,.1)",borderWidth:2,tension:.3,pointRadius:2.5,pointBackgroundColor:"#22d3ee",yAxisID:"y1",spanGaps:true}
      ]},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:10,color:"#c8d4e6",font:{size:10}}},tooltip:{mode:"index",intersect:false,callbacks:{label:function(c){if(c.dataset.yAxisID==="y1")return c.parsed.y!=null?"YoY: "+c.parsed.y.toFixed(1)+"%":"";return c.dataset.label+": "+fn(c.parsed.y)}}}},scales:{y:{position:"left",ticks:{callback:v=>fn(v),color:"#a4b2c8"}},y1:{position:"right",grid:{display:false},ticks:{callback:v=>v.toFixed(0)+"%",color:"#a4b2c8"},display:true},x:{grid:{display:false},ticks:{color:"#8898b0"}}}}}))
    }
    // 분기별 차트 (막대 + QoQ 라인)
    const qCtx=document.getElementById("sam_quarter");
    if(qCtx){
      const qMap={};
      months.forEach(m=>{const y=m.slice(2,4),mo=parseInt(m.slice(4));const q=mo<=3?1:mo<=6?2:mo<=9?3:4;const k=q+"Q"+y;if(!qMap[k])qMap[k]={label:k,val:0,sort:parseInt(m.slice(0,4))*10+q};qMap[k].val+=(samTotal[m]||0)});
      const qArr=Object.values(qMap).sort((a,b)=>a.sort-b.sort);
      const qoqArr=qArr.map((q,i)=>i>0&&qArr[i-1].val>0?((q.val-qArr[i-1].val)/qArr[i-1].val*100):null);
      charts.push(new Chart(qCtx,{type:"bar",data:{labels:qArr.map(q=>q.label),datasets:[
        {type:"bar",label:"분기 수출액 (USD)",data:qArr.map(q=>q.val),backgroundColor:"rgba(168,85,247,.3)",borderColor:"#a855f7",borderWidth:1,borderRadius:3,yAxisID:"y"},
        {type:"line",label:"QoQ (%)",data:qoqArr,borderColor:"#34d399",backgroundColor:"rgba(52,211,153,.1)",borderWidth:2,tension:.3,pointRadius:3,pointBackgroundColor:"#34d399",yAxisID:"y1",spanGaps:true}
      ]},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:10,color:"#c8d4e6",font:{size:10}}},tooltip:{mode:"index",intersect:false,callbacks:{label:function(c){if(c.dataset.yAxisID==="y1")return c.parsed.y!=null?"QoQ: "+c.parsed.y.toFixed(1)+"%":"";return c.dataset.label+": "+fn(c.parsed.y)}}}},scales:{y:{position:"left",ticks:{callback:v=>fn(v),color:"#a4b2c8"}},y1:{position:"right",grid:{display:false},ticks:{callback:v=>v.toFixed(0)+"%",color:"#a4b2c8"},display:true},x:{grid:{display:false},ticks:{color:"#8898b0"}}}}}))
    }
    // 지역별 차트 (막대 + YoY 라인)
    setTimeout(()=>{locEntries.forEach(([k,v],i)=>{const ctx=document.getElementById("sam_"+i);if(!ctx)return;
      const locYoY=calcYoYArr(v.exp||{},months);
      charts.push(new Chart(ctx,{type:"bar",data:{labels:months.map(fy),datasets:[
        {type:"bar",label:v.name+" (USD)",data:months.map(m=>v.exp[m]||0),backgroundColor:"rgba(232,168,48,.3)",borderColor:"#e8a830",borderWidth:1,borderRadius:3,yAxisID:"y"},
        {type:"line",label:"YoY (%)",data:locYoY,borderColor:"#22d3ee",backgroundColor:"rgba(34,211,238,.1)",borderWidth:2,tension:.3,pointRadius:2,pointBackgroundColor:"#22d3ee",yAxisID:"y1",spanGaps:true}
      ]},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:10,color:"#c8d4e6",font:{size:10}}},tooltip:{mode:"index",intersect:false,callbacks:{label:function(c){if(c.dataset.yAxisID==="y1")return c.parsed.y!=null?"YoY: "+c.parsed.y.toFixed(1)+"%":"";return c.dataset.label+": "+fn(c.parsed.y)}}}},scales:{y:{position:"left",ticks:{callback:v=>fn(v),color:"#a4b2c8"}},y1:{position:"right",grid:{display:false},ticks:{callback:v=>v.toFixed(0)+"%",color:"#a4b2c8"},display:true},x:{grid:{display:false},ticks:{color:"#8898b0"}}}}}))
    })},50);
  }
}

// 데이터 로드: API 서버 → JSON 파일 → DEMO 폴백
(async function(){
  // 1) FastAPI 서버
  try{
    const r=await fetch("/api/trade-data",{cache:"no-cache"});
    if(r.ok){
      const j=await r.json();
      if(j&&j.items&&Object.keys(j.items).length>0){
        D=j;isLive=true;
        console.log("[trade] API 서버에서 로드 완료:",j.generated_at);
        refresh();return;
      }
    }
  }catch(e){console.log("[trade] API 서버 미응답, JSON 파일 시도")}
  // 2) 정적 JSON 파일 폴백
  try{
    const r=await fetch("trade_data_v2.json",{cache:"no-cache"});
    if(r.ok){
      const j=await r.json();
      if(j&&j.items&&Object.keys(j.items).length>0){
        D=j;isLive=true;
        console.log("[trade] trade_data_v2.json 로드 완료:",j.generated_at);
      }
    }
  }catch(e){console.log("[trade] 외부 JSON 없음, DEMO 데이터 사용")}
  refresh();
})();
