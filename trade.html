:root{--bg:#05080e;--bg2:#0b1018;--bg3:#121a28;--bg4:#192236;--bd:#1a2436;--t1:#e6ecf6;--t2:#a4b2c8;--t3:#687891;--t4:#3c4b62;--bl:#4d9fff;--gn:#34d399;--rd:#ef5f5f;--am:#e8a830;--pr:#a78bfa;--cy:#22d3ee;--pk:#f472b6;--bl-g:rgba(77,159,255,.08);--gn-g:rgba(52,211,153,.08);--rd-g:rgba(239,95,95,.08)}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.mono{font-family:"Fira Code",monospace}
.hdr{background:linear-gradient(135deg,#080d16,#0f1724,#080d16);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;font-weight:900}.hdr h1 em{font-style:normal;background:linear-gradient(90deg,var(--bl),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:9.5px;color:var(--t4);margin-top:1px;font-family:"Fira Code"}
.hdr-r{display:flex;align-items:center;gap:8px}
.abg{padding:3px 10px;background:var(--gn-g);border:1px solid rgba(52,211,153,.22);border-radius:16px;font-size:9.5px;color:var(--gn);font-family:"Fira Code";display:flex;align-items:center;gap:5px}
.abg::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gn);animation:bk 2s ease infinite}
.abg.demo{color:var(--am);background:rgba(232,168,48,.08);border-color:rgba(232,168,48,.22)}
.abg.demo::before{background:var(--am)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
.gear-btn{width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .1s}
.gear-btn:hover{border-color:var(--bl);color:var(--bl)}

/* SETTINGS PANEL */
.settings{display:none;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;margin:10px 24px;padding:16px}
.settings.show{display:block}
.settings h3{font-size:13px;font-weight:700;margin-bottom:10px}
.settings label{font-size:11px;color:var(--t3);display:block;margin-bottom:4px}
.settings input{width:100%;max-width:500px;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--bg3);color:var(--t1);font-family:"Fira Code";font-size:12px;margin-bottom:10px}
.settings input:focus{outline:none;border-color:var(--bl)}
.settings .s-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.settings button{padding:6px 16px;border:1px solid var(--bl);border-radius:6px;background:var(--bl-g);color:var(--bl);font-size:12px;font-weight:600;cursor:pointer;font-family:"Noto Sans KR";transition:all .1s}
.settings button:hover{background:var(--bl);color:#fff}
.settings .status{font-size:11px;color:var(--t3);margin-top:6px}
.settings .status.ok{color:var(--gn)}.settings .status.err{color:var(--rd)}

.kbar{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;padding:10px 24px}
@media(max-width:900px){.kbar{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.kbar{grid-template-columns:1fr 1fr}}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.kpi:hover{border-color:var(--bl);transform:translateY(-1px)}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0;opacity:.6}
.kpi:nth-child(1)::after{background:var(--bl)}.kpi:nth-child(2)::after{background:var(--am)}.kpi:nth-child(3)::after{background:var(--pk)}.kpi:nth-child(4)::after{background:var(--cy)}.kpi:nth-child(5)::after{background:var(--pr)}.kpi:nth-child(6)::after{background:var(--gn)}
.kpi .kl{font-size:9.5px;color:var(--t3);font-weight:500;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi .kv{font-family:"Fira Code";font-size:17px;font-weight:700;margin:2px 0 1px}
.kpi .kc{font-family:"Fira Code";font-size:9.5px;display:flex;gap:6px}
.tw{padding:0 24px;border-bottom:1px solid var(--bd)}.tabs{display:flex;gap:1px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}

.cnt{padding:16px 24px;min-height:55vh}

.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

.cb.w{grid-column:1/-1}.cb h4{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:10px}

.ts{overflow-x:auto;margin-bottom:14px}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{padding:7px 8px;text-align:right;font-weight:600;color:var(--t4);border-bottom:2px solid var(--bd);font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
table.dt th:first-child{text-align:center;width:32px}table.dt th:nth-child(2){text-align:left}
table.dt td{padding:5px 8px;text-align:right;font-family:"Fira Code";font-size:11px;border-bottom:1px solid rgba(26,36,54,.6);color:var(--t2)}
table.dt td:first-child{text-align:center;color:var(--t4);font-weight:700;width:32px}
table.dt td:nth-child(2){text-align:left;font-family:"Noto Sans KR";font-weight:500;color:var(--t1)}
table.dt tr:hover{background:rgba(255,255,255,.015)}
table.dt tr.ck{cursor:pointer}table.dt tr.ck:hover{background:rgba(77,159,255,.04)}
.bar-c{position:relative}.bar-b{position:absolute;top:2px;bottom:2px;left:0;border-radius:3px;opacity:.15}
.up{color:var(--gn)}.dn{color:var(--rd)}.nt{color:var(--t4)}
.bg{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:9.5px;font-weight:600;font-family:"Fira Code"}
.bg.up{color:var(--gn);background:var(--gn-g)}.bg.dn{color:var(--rd);background:var(--rd-g)}.bg.nt{color:var(--t4)}
.pills{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}

function aggRegions(countries,months){
  const res={};
  for(const[rn,codes]of Object.entries(REGION_GROUPS)){
    const exp={},wgt={};
    months.forEach(m=>{let e=0,w=0;codes.forEach(cd=>{const c=countries[cd];if(c){e+=(c.exp[m]||0);w+=((c.wgt||{})[m]||0)}});exp[m]=e;wgt[m]=w});
    res[rn]={name:rn,exp,wgt};
  }
  return res;
}
// ===== HELPERS =====
const fn=n=>{if(!n&&n!==0)return"—";n=+n;if(Math.abs(n)>=1e9)return(n/1e9).toFixed(1)+"B";if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+"M";if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString("ko-KR")};
const fy=s=>s?(s.slice(2,4)+"."+s.slice(4)):s;
const ks=o=>Object.keys(o||{}).sort();
const lt=o=>{const k=ks(o);return k.length?k[k.length-1]:null};
const pm=y=>{let a=+y.slice(0,4),b=+y.slice(4);b--;if(b<1){b=12;a--}return a+String(b).padStart(2,"0")};
const y12=y=>(+y.slice(0,4)-1)+y.slice(4);
const mom=(s,y)=>{const p=pm(y);return(s[p]&&s[y])?((s[y]-s[p])/s[p]*100):null};
const yoy=(s,y)=>{const p=y12(y);return(s[p]&&s[y])?((s[y]-s[p])/s[p]*100):null};
const ch=(v,pre="")=>{if(v==null)return'<span class="nt">—</span>';const c=v>0?"up":v<0?"dn":"nt";return`<span class="${c}">${pre}${v>0?"▲":v<0?"▼":""}${Math.abs(v).toFixed(1)}%</span>`};
const chB=v=>{if(v==null)return'<span class="bg nt">—</span>';const c=v>0?"up":v<0?"dn":"nt";return`<span class="bg ${c}">${v>0?"▲":"▼"}${Math.abs(v).toFixed(1)}%</span>`};

const API_BASE="https://apis.data.go.kr/1220000";

async function apiCall(path, params){
  const key=document.getElementById("apiKeyInput").value||localStorage.getItem("customs_api_key")||"";
  if(!key)throw new Error("API 키 없음");
  const url=new URL(API_BASE+path);
  url.searchParams.set("serviceKey",key);
  url.searchParams.set("type","json");
  url.searchParams.set("numOfRows","100");
  for(const[k,v]of Object.entries(params))url.searchParams.set(k,v);
  const r=await fetch(url);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  let items=d?.response?.body?.items;
  if(typeof items==="object"&&!Array.isArray(items))items=items.item;
  return Array.isArray(items)?items:items?[items]:[];
}

function parseYM(row){
  const y=row.trdYy||row.yr||"";const m=row.trdMm||row.mn||"";
  if(y&&m)return y+String(m).padStart(2,"0");
  return row.yyyyMm||null;
}
function flt(v){try{return parseFloat(v)||0}catch{return 0}}

function getDateRange(months=14){
  const now=new Date();
  const end=now.getFullYear()+String(now.getMonth()+1).padStart(2,"0");
  const s=new Date(now);s.setMonth(s.getMonth()-months);
  const start=s.getFullYear()+String(s.getMonth()+1).padStart(2,"0");
  return{start,end};
}

async function fetchLiveData(){
  const key=document.getElementById("apiKeyInput").value;
  if(!key){document.getElementById("apiStatus").textContent="API 키를 입력하세요";return}
  localStorage.setItem("customs_api_key",key);

  const bar=document.getElementById("loadBar");
  const st=document.getElementById("apiStatus");
  st.className="status";st.textContent="데이터 수집 중...";
  bar.style.width="5%";

  const{start,end}=getDateRange(14);
  const result={
    generated_at:new Date().toLocaleString("ko-KR")+" (LIVE)",
    period:{start,end},main_items:CFG.main_items,
    sub_items_def:CFG.sub_items,
    all_countries:CNAMES,all_regions:RNAMES,
    total:{exp:{},imp:{}},items:{}
  };

  try{
    const allItems=Object.entries(CFG.items);
    let done=0;const total=allItems.length;

    for(const[hs,cfg]of allItems){
      st.textContent=`${cfg.name} (${hs}) 수집 중... (${done+1}/${total})`;
      bar.style.width=(5+done/total*85)+"%";

      const item={name:cfg.name,total_exp:{},total_imp:{},countries:{},regions:{}};

      // 품목 전체
      try{
        const rows=await apiCall("/itemtrade/getItemtradeList",{strtYymm:start,endYymm:end,hsSgn:hs});
        for(const r of rows){
          const ym=parseYM(r);if(!ym)continue;
          item.total_exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt));
          item.total_imp[ym]=Math.round(flt(r.impDlr||r.impUsdAmt));
          result.total.exp[ym]=(result.total.exp[ym]||0)+item.total_exp[ym];
          result.total.imp[ym]=(result.total.imp[ym]||0)+item.total_imp[ym];
        }
      }catch(e){console.warn(hs,"item err:",e)}

      // 국가별
      for(const cd of (cfg.countries||[])){
        try{
          const rows=await apiCall("/nitemtrade/getNitemtradeList",{strtYymm:start,endYymm:end,hsSgn:hs,cntrCd:cd});
          const exp={};
          for(const r of rows){const ym=parseYM(r);if(ym)exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt))}
          if(Object.keys(exp).length)item.countries[cd]={name:CNAMES[cd]||cd,exp};
        }catch(e){console.warn(hs,cd,"err:",e)}
        await new Promise(r=>setTimeout(r,200));
      }

      // 시군구별 (시도별 API)
      for(const rc of (CFG.regions||[]).slice(0,15)){
        try{
          const rows=await apiCall("/locitrade/getLocitrade",{strtYymm:start,endYymm:end,hsSgn:hs,locBrkdCd:rc});
          const exp={};
          for(const r of rows){const ym=parseYM(r);if(ym)exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt))}
          if(Object.values(exp).some(v=>v>0))item.regions[rc]={name:RNAMES[rc]||rc,exp};
        }catch(e){}
        await new Promise(r=>setTimeout(r,150));
      }

      result.items[hs]=item;
      done++;
    }

    // 세부항목
    for(const[parentHs,subs]of Object.entries(CFG.sub_items||{})){
      if(!result.items[parentHs])continue;
      result.items[parentHs].sub_items={};
      for(const[scode,sname]of Object.entries(subs)){
        try{
          const rows=await apiCall("/itemtrade/getItemtradeList",{strtYymm:start,endYymm:end,hsSgn:scode});
          const exp={};
          for(const r of rows){const ym=parseYM(r);if(ym)exp[ym]=Math.round(flt(r.expDlr||r.expUsdAmt))}
          if(Object.keys(exp).length)result.items[parentHs].sub_items[scode]={name:sname,exp};
        }catch(e){}
        await new Promise(r=>setTimeout(r,200));
      }
    }

    bar.style.width="100%";
    D=result;isLive=true;
    document.getElementById("modeBadge").textContent="LIVE";
    document.getElementById("modeBadge").className="abg";
    st.className="status ok";st.textContent=`✅ 완료! ${Object.keys(result.items).length}개 품목 수집`;
    refresh();
    setTimeout(()=>{bar.style.width="0%"},1000);

  }catch(e){
    bar.style.width="0%";
    st.className="status err";
    if(e.message.includes("Failed to fetch"))st.textContent="❌ CORS 차단 — GitHub Actions를 사용하세요";
    else st.textContent="❌ 오류: "+e.message;
  }
}

function rRanking(el){
  const R=D.ranking_6d||{};const N4=D.hs4_names||{};const N2=D.hs2_names||{};

  const MIN_EXP=1000000;
  let rows=[];for(const[hs,d]of Object.entries(R)){
    const e=d.exp||{};const val=e[lm]||0;if(val<MIN_EXP)continue;
    const hs4=hs.slice(0,4);const hs2=hs.slice(0,2);let nm4=N4[hs4]||"";let nm2=N2[hs2]||"";
    rows.push({hs,hs4,hs2,name:d.name||hs,nm4,nm2,val,mom:mom(e,lm),yoy:yoy(e,lm),exp:e});

  let h=`<div class="st"><span class="d" style="background:var(--rd)"></span>6자리 HS 수출 변동률 (${fy(lm)}) — ${rows.length}개 (100만USD↑)</div>`;

    h+=`<tr><td>${i+1}</td><td class="mono" style="color:var(--t4)">${r.hs}</td><td style="${tc};text-align:left" title="${r.nm2}">${r.nm2}</td><td style="${tc};text-align:left" title="${(N4[r.hs4]||"").replace(/"/g,"&quot;")}">${r.nm4}</td><td style="${tc};text-align:left;font-family:Noto Sans KR" title="${r.name}">${r.name}</td><td>${fn(r.val)}</td><td>${chB(r.yoy)}</td><td>${chB(r.mom)}</td></tr>`});

  el.innerHTML=h;

    charts.push(new Chart(ctx,{type:"line",data:{labels:rm.map(fy),datasets:items.map((r,i)=>({label:`${r.name}(${r.hs})`,data:rm.map(m=>(r.exp[m]||0)),borderColor:CL[i%CL.length],borderWidth:1.5,tension:.3,pointRadius:1}))},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:8,font:{size:9},color:"#c8d4e6"}}},scales:{y:{ticks:{callback:v=>fn(v),color:"#a4b2c8"},grid:{color:"rgba(255,255,255,.04)"}},x:{ticks:{color:"#8898b0"},grid:{display:false}}}}}))};
