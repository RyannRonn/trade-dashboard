# .github/workflows/trade-update.yml
# 관세청 수출입 데이터 자동 업데이트 (매월 15일 오전 9시 KST)
#
# 설정 방법:
# 1. GitHub repo Settings → Secrets → New repository secret
#    Name: DATA_GO_KR_API_KEY
#    Value: 공공데이터포털 인증키
#
# 2. 이 파일을 .github/workflows/ 에 저장
# 3. 끝! 매월 15일 자동으로 데이터가 업데이트됩니다.

name: 📊 수출입 데이터 자동 업데이트

on:
  schedule:
    # 매월 15일 오전 9시 KST (= UTC 00:00)
    - cron: '0 0 15 * *'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 의존성 설치
      run: pip install -r requirements.txt

    - name: 📡 데이터 수집 & HTML 생성
      env:
        API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      run: python customs_trade_v2.py

    - name: 🗄️ DB 동기화
      run: python -m collector.migrate_json

    - name: 🇰🇷 한국 전체 수출입 총액 (HS2 99개 합산)
      env:
        API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      run: python collect_korea_total.py

    - name: 🚀 Commit & Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add trade.html trade_data_v2.json trade.db
        git diff --staged --quiet || git commit -m "📊 수출입 데이터 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
        git push
